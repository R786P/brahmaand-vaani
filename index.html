<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ब्रह्माण्ड वाणी</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:wght@300;400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100vw;height:100vh;overflow:hidden;background:#000;font-family:'Crimson Pro',serif;color:#fff8e7;}

/* ── STARS ── */
#cvs{position:fixed;inset:0;z-index:0;}

/* ── NEBULA ── */
.nb{position:fixed;border-radius:50%;filter:blur(90px);z-index:1;pointer-events:none;animation:nbdrift 25s ease-in-out infinite alternate;}
.nb1{width:700px;height:500px;background:radial-gradient(ellipse,rgba(90,0,180,.5),transparent 70%);top:-15%;left:-15%;}
.nb2{width:650px;height:650px;background:radial-gradient(ellipse,rgba(0,20,130,.55),transparent 70%);bottom:-15%;right:-15%;animation-duration:32s;animation-direction:alternate-reverse;}
.nb3{width:380px;height:380px;background:radial-gradient(ellipse,rgba(180,0,60,.35),transparent 70%);top:22%;right:12%;animation-duration:19s;}
.nb4{width:280px;height:280px;background:radial-gradient(ellipse,rgba(0,130,100,.25),transparent 70%);bottom:18%;left:10%;animation-duration:22s;animation-direction:alternate-reverse;}
@keyframes nbdrift{to{transform:translate(45px,35px) scale(1.15);}}

.gr{position:fixed;top:50%;left:50%;border-radius:50%;border:1px solid rgba(200,160,255,.07);transform:translate(-50%,-50%) rotateX(72deg);animation:grot 65s linear infinite;z-index:1;}
.gr:nth-child(2){width:950px;height:950px;}
.gr:nth-child(3){width:680px;height:680px;border-color:rgba(150,220,255,.05);animation-duration:48s;}
.gr:nth-child(4){width:440px;height:440px;border-color:rgba(255,220,100,.04);animation-duration:30s;}
@keyframes grot{to{transform:translate(-50%,-50%) rotateX(72deg) rotateZ(360deg);}}

/* ── TITLE ── */
#title{position:fixed;top:20px;left:50%;transform:translateX(-50%);text-align:center;z-index:40;pointer-events:none;}
#title h1{font-family:'Cinzel Decorative',cursive;font-size:clamp(.95rem,2.2vw,1.8rem);color:#f5c842;text-shadow:0 0 30px rgba(245,200,66,.9),0 0 70px rgba(245,200,66,.4);letter-spacing:5px;white-space:nowrap;}
#title p{font-size:.65rem;color:rgba(255,248,231,.3);letter-spacing:9px;margin-top:3px;font-style:italic;}

/* ── GEAR ── */
#gear{position:fixed;top:16px;left:16px;z-index:200;width:44px;height:44px;border-radius:50%;background:rgba(5,2,16,.7);border:1px solid rgba(245,200,66,.25);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;backdrop-filter:blur(12px);transition:all .3s;}
#gear:hover{border-color:#f5c842;box-shadow:0 0 20px rgba(245,200,66,.4);transform:rotate(60deg);}

/* ── SETTINGS MODAL ── */
#smod{position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .3s;}
#smod.open{opacity:1;pointer-events:all;}
#sbox{background:linear-gradient(135deg,rgba(8,3,25,.97),rgba(28,8,65,.95));border:1px solid rgba(245,200,66,.28);border-radius:24px;padding:30px;width:min(360px,92vw);box-shadow:0 0 60px rgba(100,0,200,.4);}
#sbox h2{font-family:'Cinzel Decorative',cursive;font-size:.82rem;color:#f5c842;letter-spacing:3px;text-align:center;margin-bottom:20px;}
.sf label{font-size:.62rem;letter-spacing:2px;color:rgba(255,248,231,.45);display:block;margin-bottom:5px;text-transform:uppercase;}
.sf input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(245,200,66,.2);border-radius:10px;padding:11px 14px;font-size:.85rem;color:#fff8e7;outline:none;font-family:'Crimson Pro',serif;transition:border-color .3s;margin-bottom:14px;}
.sf input:focus{border-color:rgba(245,200,66,.65);}
.sf input::placeholder{color:rgba(255,248,231,.2);font-size:.75rem;}
.sf small{font-size:.62rem;color:rgba(255,248,231,.3);line-height:1.6;display:block;margin-top:-10px;margin-bottom:14px;}
.sf small a{color:rgba(245,200,66,.6);text-decoration:none;}
#svbtn{width:100%;padding:12px;background:linear-gradient(135deg,#c8860a,#f5c842);border:none;border-radius:10px;color:#1a0800;font-family:'Cinzel Decorative',cursive;font-size:.72rem;letter-spacing:2px;cursor:pointer;transition:all .3s;}
#svbtn:hover{box-shadow:0 0 25px rgba(245,200,66,.6);}
#clsbtn{width:100%;padding:9px;background:transparent;border:1px solid rgba(255,255,255,.12);border-radius:10px;color:rgba(255,248,231,.4);font-size:.8rem;cursor:pointer;margin-top:10px;transition:all .3s;}
#clsbtn:hover{border-color:rgba(255,255,255,.3);color:rgba(255,248,231,.7);}

/* ── GOD PANEL ── */
#gpanel{position:fixed;right:14px;top:50%;transform:translateY(-50%);z-index:40;display:flex;flex-direction:column;gap:7px;align-items:center;}
#gpanel>span{font-size:.5rem;letter-spacing:2px;color:rgba(245,200,66,.5);text-transform:uppercase;writing-mode:vertical-rl;margin-bottom:4px;}
.gb{width:48px;height:48px;border-radius:12px;border:1.5px solid rgba(245,200,66,.2);background:rgba(5,2,16,.7);cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(10px);gap:1px;}
.gb .gi{font-size:1.3rem;line-height:1;}
.gb .gn{font-size:.3rem;color:rgba(245,200,66,.6);letter-spacing:.5px;}
.gb:hover,.gb.on{border-color:#f5c842;box-shadow:0 0 18px rgba(245,200,66,.55),inset 0 0 14px rgba(245,200,66,.08);transform:scale(1.08);}

/* ── GOD SCENE ── */
#gscene{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(420px,90vw);height:66vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;opacity:0;transition:opacity .9s;pointer-events:none;z-index:20;}
#gscene.vis{opacity:1;}

/* Mandala */
#mandala{position:absolute;bottom:115px;left:50%;transform:translateX(-50%);width:310px;height:310px;opacity:.14;animation:mspin 28s linear infinite;}
@keyframes mspin{to{transform:translateX(-50%) rotate(360deg);}}

/* Aura glow behind god */
#gaura{position:absolute;bottom:85px;left:50%;width:260px;height:260px;border-radius:50%;filter:blur(50px);animation:apulse 3s ease-in-out infinite;transform:translateX(-50%);}
@keyframes apulse{0%,100%{transform:translateX(-50%) scale(1);opacity:.6;}50%{transform:translateX(-50%) scale(1.22);opacity:1;}}

/* ── GOD FACE (CSS Art) ── */
#godface{
  position:relative;z-index:10;
  width:190px;height:240px;
  animation:gfloat 5s ease-in-out infinite;
  margin-bottom:10px;
  transition:filter .5s;
}
@keyframes gfloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);}}
#godface.speaking{animation:gfloat 5s ease-in-out infinite,gspk .4s ease-in-out infinite alternate;}
@keyframes gspk{from{filter:drop-shadow(0 0 25px rgba(245,200,66,.6));}to{filter:drop-shadow(0 0 65px rgba(245,200,66,1)) drop-shadow(0 0 18px rgba(255,255,255,.25));}}
#godface.listening{animation:glis .65s ease-in-out infinite alternate;}
@keyframes glis{from{transform:translateY(-8px) rotate(-4deg);filter:drop-shadow(0 0 28px rgba(100,210,255,.8));}to{transform:translateY(-16px) rotate(4deg);filter:drop-shadow(0 0 55px rgba(100,210,255,1));}}

/* The actual canvas-based god face renders inside this */
#godcanvas{width:190px;height:240px;border-radius:12px;}

#gname{font-family:'Cinzel Decorative',cursive;color:#f5c842;font-size:.88rem;letter-spacing:5px;text-shadow:0 0 25px rgba(245,200,66,.9);margin-bottom:8px;}

/* Sound waves */
#swaves{position:fixed;bottom:200px;left:50%;transform:translateX(-50%);pointer-events:none;}
.sw{position:absolute;width:130px;height:130px;border-radius:50%;border:2px solid rgba(245,200,66,.4);top:50%;left:50%;transform:translate(-50%,-50%) scale(0);opacity:0;}
.sw.go{animation:swgo 2.3s ease-out forwards;}
.sw:nth-child(2){animation-delay:.38s;}.sw:nth-child(3){animation-delay:.76s;}
@keyframes swgo{0%{transform:translate(-50%,-50%) scale(0);opacity:.85;}100%{transform:translate(-50%,-50%) scale(3.8);opacity:0;}}

/* ── ANSWER BUBBLE ── */
#awrap{position:fixed;bottom:162px;left:50%;transform:translateX(-50%) translateY(12px);width:min(500px,90vw);z-index:30;opacity:0;pointer-events:none;transition:opacity .5s,transform .5s;}
#awrap.show{opacity:1;transform:translateX(-50%) translateY(0);}
#abox{background:linear-gradient(135deg,rgba(10,3,30,.96),rgba(35,8,80,.93));border:1px solid rgba(245,200,66,.3);border-radius:22px;padding:18px 24px;text-align:center;font-size:1.02rem;line-height:1.82;backdrop-filter:blur(28px);box-shadow:0 8px 60px rgba(80,0,200,.3);}
#abox::after{content:'';position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);border:13px solid transparent;border-top-color:rgba(245,200,66,.22);}
#atxt{display:block;}
#atxt.typing::after{content:'|';animation:blk .6s step-end infinite;color:#f5c842;}
@keyframes blk{50%{opacity:0;}}

/* ── STATUS ── */
#status{position:fixed;bottom:116px;left:50%;transform:translateX(-50%);font-size:.68rem;letter-spacing:3px;color:rgba(255,248,231,.3);text-transform:uppercase;white-space:nowrap;z-index:30;transition:color .4s;}

/* ── LOADER ── */
#ldr{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);display:none;gap:7px;z-index:31;}
#ldr.show{display:flex;}
.ld{width:8px;height:8px;border-radius:50%;background:#f5c842;opacity:.2;animation:ldan 1.3s ease-in-out infinite;}
.ld:nth-child(2){animation-delay:.22s;}.ld:nth-child(3){animation-delay:.44s;}
@keyframes ldan{0%,100%{opacity:.2;transform:scale(.75);}50%{opacity:1;transform:scale(1.3);}}

/* ── INPUT BAR ── */
#ibar{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);display:flex;gap:10px;align-items:center;width:min(620px,90vw);z-index:40;}
#qinp{flex:1;background:rgba(6,2,20,.9);border:1.5px solid rgba(245,200,66,.3);border-radius:50px;padding:15px 22px;font-size:1rem;font-family:'Crimson Pro',serif;color:#fff8e7;outline:none;backdrop-filter:blur(22px);transition:all .35s;box-shadow:0 0 22px rgba(80,0,200,.15);}
#qinp:focus{border-color:rgba(245,200,66,.7);box-shadow:0 0 35px rgba(245,200,66,.22);}
#qinp::placeholder{color:rgba(255,248,231,.22);}
#qinp:disabled{opacity:.5;cursor:not-allowed;}
.ib{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;font-size:1.2rem;transition:all .3s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#micb{background:linear-gradient(135deg,#120830,#380f70);border:1.5px solid rgba(245,200,66,.3);box-shadow:0 0 18px rgba(100,0,200,.35);position:relative;overflow:visible;}
#micb:hover{transform:scale(1.1);}
#micb.on{background:linear-gradient(135deg,#001830,#004870);border-color:rgba(80,200,255,.85);box-shadow:0 0 30px rgba(0,160,255,.65);animation:mpls .55s ease-in-out infinite alternate;}
@keyframes mpls{to{transform:scale(1.15);}}
.mr{position:absolute;inset:-7px;border-radius:50%;border:2px solid rgba(80,200,255,.3);animation:mring 1.1s ease-out infinite;display:none;}
.mr:nth-child(2){inset:-14px;animation-delay:.5s;}
#micb.on .mr{display:block;}
@keyframes mring{0%{transform:scale(1);opacity:.7;}100%{transform:scale(1.5);opacity:0;}}
#sndb{background:linear-gradient(135deg,#c8860a,#f5c842);color:#1a0800;box-shadow:0 0 22px rgba(245,200,66,.4);}
#sndb:hover{transform:scale(1.1);box-shadow:0 0 40px rgba(245,200,66,.75);}
#sndb:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* ── PARTICLES ── */
.pt{position:fixed;border-radius:50%;pointer-events:none;z-index:50;animation:pfly 1.7s ease-out forwards;}
@keyframes pfly{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0);}}

/* ── TOAST ── */
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff8e7;padding:10px 22px;border-radius:50px;font-size:.8rem;z-index:700;opacity:0;transition:opacity .3s;border:1px solid rgba(245,200,66,.22);white-space:nowrap;backdrop-filter:blur(12px);}
#toast.show{opacity:1;}

/* ── INTRO ── */
#intro{position:fixed;inset:0;background:#000;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;transition:opacity 1.6s;}
#iom{font-size:5rem;animation:omg 2s ease-in-out infinite alternate;}
@keyframes omg{from{filter:drop-shadow(0 0 15px rgba(245,200,66,.4));}to{filter:drop-shadow(0 0 80px rgba(245,200,66,1));}}
#intro h1{font-family:'Cinzel Decorative',cursive;font-size:clamp(1.5rem,5vw,3.2rem);color:#f5c842;text-shadow:0 0 60px rgba(245,200,66,.8);text-align:center;opacity:0;animation:iup 2s ease .8s forwards;}
#intro p{color:rgba(255,248,231,.45);letter-spacing:7px;font-size:.82rem;text-align:center;opacity:0;animation:iup 2s ease 1.8s forwards;}
#ibtn{margin-top:18px;padding:14px 48px;background:transparent;border:1.5px solid #f5c842;color:#f5c842;font-family:'Cinzel Decorative',cursive;font-size:.85rem;letter-spacing:4px;cursor:pointer;border-radius:50px;transition:all .4s;opacity:0;animation:iup 2s ease 2.8s forwards;}
#ibtn:hover{background:rgba(245,200,66,.12);box-shadow:0 0 40px rgba(245,200,66,.5);transform:scale(1.06);}
@keyframes iup{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div id="intro">
  <div id="iom">🕉️</div>
  <h1>ब्रह्माण्ड वाणी</h1>
  <p>DIVINE ORACLE · COSMIC CONSCIOUSNESS</p>
  <button id="ibtn" onclick="enter()">प्रवेश करें ✨</button>
</div>

<canvas id="cvs"></canvas>
<div class="nb nb1"></div><div class="nb nb2"></div><div class="nb nb3"></div><div class="nb nb4"></div>
<div class="gr"></div><div class="gr"></div><div class="gr"></div>

<div id="title"><h1>🕉️ ब्रह्माण्ड वाणी</h1><p>DIVINE ORACLE</p></div>
<div id="gear" onclick="openS()">⚙️</div>

<div id="smod">
  <div id="sbox">
    <h2>⚙️ DIVINE SETTINGS</h2>
    <div class="sf">
      <label>ElevenLabs API Key — Madhur Awaaz</label>
      <input type="password" id="ekey" placeholder="sk_xxxxxxxxxxxxxxxx"/>
      <small>Free: <a href="https://elevenlabs.io" target="_blank">elevenlabs.io</a> → Sign Up → Profile → API Key (10,000 chars/month free!)</small>
      <label>ElevenLabs ke bina bhi kaam karega — browser voice use hogi</label>
    </div>
    <button id="svbtn" onclick="saveS()">✨ ACTIVATE</button>
    <button id="clsbtn" onclick="closeS()">बंद करें ✕</button>
  </div>
</div>

<div id="gpanel">
  <span>देव</span>
  <button class="gb on" id="g-shiva" onclick="chgod('shiva')"><span class="gi">🔱</span><span class="gn">SHIVA</span></button>
  <button class="gb" id="g-krishna" onclick="chgod('krishna')"><span class="gi">🦚</span><span class="gn">KRISHNA</span></button>
  <button class="gb" id="g-ganesh" onclick="chgod('ganesh')"><span class="gi">🐘</span><span class="gn">GANESH</span></button>
  <button class="gb" id="g-durga" onclick="chgod('durga')"><span class="gi">⚔️</span><span class="gn">DURGA</span></button>
  <button class="gb" id="g-vishnu" onclick="chgod('vishnu')"><span class="gi">🌊</span><span class="gn">VISHNU</span></button>
  <button class="gb" id="g-brahma" onclick="chgod('brahma')"><span class="gi">✨</span><span class="gn">BRAHMA</span></button>
</div>

<div id="swaves"><div class="sw"></div><div class="sw"></div><div class="sw"></div></div>

<div id="gscene">
  <svg id="mandala" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="rgba(245,200,66,.85)" stroke-width=".5">
      <circle cx="100" cy="100" r="95"/><circle cx="100" cy="100" r="78"/><circle cx="100" cy="100" r="60"/><circle cx="100" cy="100" r="44"/><circle cx="100" cy="100" r="28"/>
      <line x1="100" y1="5" x2="100" y2="195"/><line x1="5" y1="100" x2="195" y2="100"/><line x1="30" y1="30" x2="170" y2="170"/><line x1="170" y1="30" x2="30" y2="170"/>
      <line x1="5" y1="100" x2="57" y2="22"/><line x1="195" y1="100" x2="143" y2="22"/>
      <polygon points="100,18 122,82 188,100 122,118 100,182 78,118 12,100 78,82" stroke="rgba(245,200,66,.65)" fill="rgba(245,200,66,.02)"/>
      <circle cx="100" cy="18" r="4" fill="rgba(245,200,66,.7)"/><circle cx="100" cy="182" r="4" fill="rgba(245,200,66,.7)"/><circle cx="18" cy="100" r="4" fill="rgba(245,200,66,.7)"/><circle cx="182" cy="100" r="4" fill="rgba(245,200,66,.7)"/>
    </g>
  </svg>
  <div id="gaura"></div>
  <div id="godface"><canvas id="godcanvas" width="190" height="240"></canvas></div>
  <div id="gname">भगवान शिव</div>
</div>

<div id="awrap"><div id="abox"><span id="atxt"></span></div></div>
<div id="ldr"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
<div id="status">प्रश्न पूछें — ब्रह्मांड सुन रहा है 🙏</div>

<div id="ibar">
  <button class="ib" id="micb" onclick="togMic()">🎤<div class="mr"></div><div class="mr"></div></button>
  <input id="qinp" type="text" placeholder="अपना प्रश्न लिखें या 🎤 दबाएं..."/>
  <button class="ib" id="sndb" onclick="ask()">⚡</button>
</div>
<div id="toast"></div>

<script>
// ════════════════════════════════════════════
// STARS
// ════════════════════════════════════════════
const cv=document.getElementById('cvs'),ctx=cv.getContext('2d');
let ST=[],SH=[];
function rsz(){
  cv.width=innerWidth;cv.height=innerHeight;ST=[];
  for(let i=0;i<400;i++)ST.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.8+.15,ph:Math.random()*6.28,sp:Math.random()*.3+.04,h:185+Math.random()*90,s:55+Math.random()*35,l:65+Math.random()*28});
}
window.addEventListener('resize',rsz);rsz();
let T=0;
(function loop(){
  ctx.clearRect(0,0,cv.width,cv.height);T+=.007;
  ST.forEach(s=>{const op=.2+.75*Math.abs(Math.sin(T*s.sp+s.ph));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fillStyle=`hsla(${s.h},${s.s}%,${s.l}%,${op})`;ctx.fill();});
  SH=SH.filter(s=>s.op>.01);
  SH.forEach(s=>{
    const g=ctx.createLinearGradient(s.x,s.y,s.x-Math.cos(s.a)*s.l,s.y-Math.sin(s.a)*s.l);
    g.addColorStop(0,`rgba(255,248,200,${s.op})`);g.addColorStop(1,'transparent');
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-Math.cos(s.a)*s.l,s.y-Math.sin(s.a)*s.l);
    ctx.strokeStyle=g;ctx.lineWidth=2;ctx.stroke();
    s.x+=Math.cos(s.a)*s.sp;s.y+=Math.sin(s.a)*s.sp;s.op-=.012;
  });
  requestAnimationFrame(loop);
})();
setInterval(()=>SH.push({x:Math.random()*cv.width,y:Math.random()*cv.height*.5,l:110+Math.random()*130,sp:5+Math.random()*7,op:1,a:Math.PI/4+Math.random()*.5}),3000);

// ════════════════════════════════════════════
// COSMIC MUSIC
// ════════════════════════════════════════════
let aCtx=null;
function startMusic(){
  try{
    aCtx=new(window.AudioContext||window.webkitAudioContext)();
    [[55,.0],[82.4,.018],[110,0],[165,.012],[220,0],[329.6,.008]].forEach(([f,d],i)=>{
      const o=aCtx.createOscillator(),g=aCtx.createGain(),fl=aCtx.createBiquadFilter();
      o.type=i<2?'sine':'triangle';o.frequency.value=f+d*f;
      g.gain.setValueAtTime(0,aCtx.currentTime);g.gain.linearRampToValueAtTime(.05/(i*.4+1),aCtx.currentTime+5);
      fl.type='lowpass';fl.frequency.value=700;
      o.connect(fl);fl.connect(g);g.connect(aCtx.destination);o.start();
    });
    function bell(){
      if(!aCtx)return;
      const f=[396,528,639,741,852][Math.floor(Math.random()*5)];
      const o=aCtx.createOscillator(),g=aCtx.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(.2,aCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,aCtx.currentTime+6);
      o.connect(g);g.connect(aCtx.destination);o.start();o.stop(aCtx.currentTime+6);
      setTimeout(bell,5000+Math.random()*8000);
    }
    setTimeout(bell,2500);
  }catch(e){}
}

const GX=GC.getContext('2d');

const FACES={

function drawFace(god,ex,ey,mouth){
  const f=FACES[god];
  const w=190,h=240;
  GX.clearRect(0,0,w,h);

  // ── ORNAMENT / CROWN ──
  drawOrnament(f,god,w,h);

  // ── NECK ──
  const ng=GX.createLinearGradient(75,195,115,235);
  ng.addColorStop(0,f.skinTop);ng.addColorStop(1,f.skinBot);
  GX.beginPath();GX.ellipse(95,215,22,28,0,0,Math.PI*2);GX.fillStyle=ng;GX.fill();

  // ── FACE BASE ──
  const fg=GX.createRadialGradient(95,118,10,95,118,72);
  fg.addColorStop(0,lighten(f.skinTop,.3));fg.addColorStop(.5,f.skinTop);fg.addColorStop(1,f.skinBot);
  GX.beginPath();
  if(god==='ganesh'){
    // Elephant head - wider
    GX.ellipse(95,130,78,85,0,0,Math.PI*2);
  } else {
    GX.ellipse(95,122,62,72,0,0,Math.PI*2);
  }
  GX.fillStyle=fg;GX.fill();

  // Face shading
  const sh=GX.createRadialGradient(130,100,5,130,100,80);
  sh.addColorStop(0,'rgba(0,0,0,0)');sh.addColorStop(1,'rgba(0,0,40,.22)');
  GX.beginPath();
  GX.ellipse(95,122,62,72,0,0,Math.PI*2);
  GX.fillStyle=sh;GX.fill();

  // ── GANESH SPECIAL ──
  if(god==='ganesh'){
    drawGaneshDetails(f,ex,ey,mouth);
    return;
  }

  // ── HAIR ──
  drawHair(f,god,w);

  // ── FOREHEAD MARK ──
  drawMark(f,god);

  // ── EYEBROWS ──
  GX.beginPath();GX.moveTo(55,105);GX.quadraticCurveTo(72,97,88,105);
  GX.strokeStyle=f.hairColor;GX.lineWidth=3.5;GX.lineCap='round';GX.stroke();
  GX.beginPath();GX.moveTo(102,105);GX.quadraticCurveTo(118,97,135,105);
  GX.strokeStyle=f.hairColor;GX.lineWidth=3.5;GX.stroke();

  // ── EYES ──
  drawEye(70+ex,115+ey,f,mouth,god,'left');
  drawEye(116+ex,115+ey,f,mouth,god,'right');

  // ── NOSE ──
  GX.beginPath();GX.ellipse(95,134,6,5,0,0,Math.PI*2);
  GX.fillStyle='rgba(0,0,0,.15)';GX.fill();
  GX.beginPath();GX.moveTo(89,136);GX.quadraticCurveTo(95,142,101,136);
  GX.strokeStyle=darken(f.skinBot,.2);GX.lineWidth=1.8;GX.stroke();

  // ── MOUTH ──
  drawMouth(95,155,f,mouth,god);

  // ── DURGA NOSE RING ──
  if(god==='durga'){
    GX.beginPath();GX.arc(103,136,4,0,Math.PI*2);
    GX.strokeStyle='#f5c842';GX.lineWidth=1.8;GX.stroke();
  }

  // ── NECKLACE ──
  drawNecklace(f,god);
}

function drawEye(cx,cy,f,mouth,god,side){
  // Blink animation
  const blinkFactor=Math.max(0,Math.sin(blinkT*3)*2);
  const eyeH=blinkFactor>1.8?1:10;

  // White
  GX.beginPath();GX.ellipse(cx,cy,13,eyeH,0,0,Math.PI*2);
  GX.fillStyle='white';GX.fill();
  GX.strokeStyle='rgba(0,0,0,.3)';GX.lineWidth=1;GX.stroke();

  if(eyeH<2) return; // blinking

  // Iris
  GX.beginPath();GX.ellipse(cx,cy,8,8,0,0,Math.PI*2);
  GX.fillStyle=f.eyeColor;GX.fill();

  // Pupil
  GX.beginPath();GX.ellipse(cx,cy,3.5,3.5,0,0,Math.PI*2);
  GX.fillStyle='#000';GX.fill();

  // Highlight
  GX.beginPath();GX.ellipse(cx-1.5,cy-1.5,1.4,1.4,0,0,Math.PI*2);
  GX.fillStyle='#fff';GX.fill();

  // Kajal for durga
  if(god==='durga'){
    GX.beginPath();
    if(side==='left'){GX.moveTo(cx-13,cy);GX.lineTo(cx-22,cy-3);}
    else{GX.moveTo(cx+13,cy);GX.lineTo(cx+22,cy-3);}
    GX.strokeStyle='#000';GX.lineWidth=2;GX.lineCap='round';GX.stroke();
  }
}

function drawMouth(cx,cy,f,open,god){
  if(open){
    // Speaking mouth - open
    GX.beginPath();GX.ellipse(cx,cy,16,9,0,0,Math.PI*2);
    GX.fillStyle=god==='durga'?'#cc3322':'rgba(80,40,40,.8)';GX.fill();
    // Teeth
    GX.beginPath();GX.rect(cx-10,cy-5,20,6);GX.fillStyle='#fffef0';GX.fill();
    // Upper lip
    GX.beginPath();GX.moveTo(cx-16,cy);GX.quadraticCurveTo(cx-8,cy-8,cx,cy-6);GX.quadraticCurveTo(cx+8,cy-8,cx+16,cy);
    GX.strokeStyle=god==='durga'?'#880000':darken(f.skinBot,.25);GX.lineWidth=2;GX.stroke();
  } else {
    // Closed smile
    const smileAmt=god==='durga'?6:10;
    GX.beginPath();GX.moveTo(cx-16,cy);GX.quadraticCurveTo(cx,cy+smileAmt,cx+16,cy);
    if(god==='durga') GX.fillStyle='#cc3322';
    else GX.fillStyle='rgba(220,150,130,.4)';
    GX.fill();
    GX.strokeStyle=god==='durga'?'#880000':darken(f.skinBot,.25);GX.lineWidth=2.5;GX.lineCap='round';GX.stroke();
    // Upper lip line
    GX.beginPath();GX.moveTo(cx-16,cy);GX.quadraticCurveTo(cx-7,cy-5,cx,cy-3);GX.quadraticCurveTo(cx+7,cy-5,cx+16,cy);
    GX.strokeStyle=god==='durga'?'#880000':darken(f.skinBot,.2);GX.lineWidth=1.5;GX.stroke();
  }
}

function drawHair(f,god,w){

    GX.beginPath();GX.moveTo(45,90);GX.quadraticCurveTo(95,70,145,90);GX.quadraticCurveTo(150,110,148,130);
    GX.fillStyle='#111133';GX.fill();
    return;
  }
  if(god==='brahma'){
    // White flowing beard
    GX.beginPath();GX.moveTo(60,175);GX.quadraticCurveTo(75,215,85,245);GX.quadraticCurveTo(95,258,105,245);GX.quadraticCurveTo(115,215,130,175);
    GX.fillStyle='white';GX.fill();
    GX.beginPath();GX.moveTo(65,178);GX.quadraticCurveTo(82,218,93,248);GX.quadraticCurveTo(95,255,97,248);GX.quadraticCurveTo(108,218,125,178);
    GX.fillStyle='#eeeedd';GX.fill();
    return;
  }
  // Default hair
  GX.beginPath();GX.moveTo(35,110);GX.quadraticCurveTo(40,70,95,60);GX.quadraticCurveTo(150,70,155,110);

}

function drawMark(f,god){

    GX.beginPath();GX.moveTo(72,87);GX.lineTo(118,87);GX.strokeStyle='rgba(255,255,255,.5)';GX.lineWidth=2;GX.stroke();
    GX.beginPath();GX.moveTo(75,91);GX.lineTo(115,91);GX.stroke();
    GX.beginPath();GX.moveTo(78,95);GX.lineTo(112,95);GX.stroke();
  } else if(god==='krishna'){

    GX.beginPath();GX.ellipse(95,97,5,8,0,0,Math.PI*2);GX.fillStyle='#ffdd00';GX.fill();
    GX.shadowColor='#ffdd00';GX.shadowBlur=8;

    GX.shadowBlur=0;

    GX.fillStyle='#cc0000';GX.fill();
    GX.beginPath();GX.arc(95,95,5,0,Math.PI*2);

  // Crown
  const cg=GX.createLinearGradient(55,55,135,90);

  GX.beginPath();GX.ellipse(95,60,8,11,0,0,Math.PI*2);GX.fillStyle='#ff4400';GX.fill();

}

function drawNecklace(f,god){
  if(god==='shiva'){
    // Rudraksha beads
    for(let i=0;i<9;i++){
      const ang=-Math.PI*.7+i*(Math.PI*1.4/8);

function getAns(q,g){
  const ql=q.toLowerCase();
  for(const [kw,rs] of Object.entries(KW)){
    if(new RegExp(kw,'i').test(ql)&&rs[g]) return rs[g];
  }
  const pool=W[g];
  return pool[Math.floor(Math.random()*pool.length)];
}

function chgod(g){
  CUR=g;

  document.querySelectorAll('.gb').forEach(b=>b.classList.remove('on'));

    document.getElementById('atxt').className='';

}

function trackEye(px,py){
  const el=document.getElementById('godcanvas');
  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height/2;
  const dx=(px-cx)/innerWidth,dy=(py-cy)/innerHeight;
  EX=Math.max(-9,Math.min(9,dx*24));
  EY=Math.max(-7,Math.min(7,dy*22));
  redrawGod();
}
document.addEventListener('mousemove',e=>{
  if(document.getElementById('gscene').classList.contains('vis')) trackEye(e.clientX,e.clientY);
});
document.addEventListener('touchmove',e=>{
  if(document.getElementById('gscene').classList.contains('vis')){
    const t=e.touches[0];trackEye(t.clientX,t.clientY);
  }
},{passive:true});

// ════════════════════════════════════════════
// MIC
// ════════════════════════════════════════════
function togMic(){
  if(BUSY) return;
  if(LIS){REC?.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Browser mic support nahi karta 😢');return;}
  REC=new SR();REC.lang='hi-IN';REC.continuous=false;REC.interimResults=true;
  REC.onstart=()=>{
    LIS=true;
    document.getElementById('micb').classList.add('on');
    document.getElementById('godface').classList.add('listening');
    showGod(false);setst('🎤 बोलिए... देव सुन रहे हैं');
  };
  REC.onresult=e=>{
    document.getElementById('qinp').value=Array.from(e.results).map(r=>r[0].transcript).join('');
  };
  REC.onerror=()=>{endLis();toast('Dobara try karein 🙏');};
  REC.onend=()=>{
    endLis();
    const v=document.getElementById('qinp').value.trim();
    if(v) ask();
    else{setst('Kuch suna nahi... 🙏');hideGod();}
  };
  REC.start();
}
function endLis(){
  LIS=false;
  document.getElementById('micb').classList.remove('on');
  document.getElementById('godface').classList.remove('listening');
}

// ════════════════════════════════════════════
// ASK — BUG FIXED: BUSY always resets
// ════════════════════════════════════════════
async function ask(){
  if(BUSY) return;

  const inp=document.getElementById('qinp');
  const q=inp.value.trim();
  if(!q){toast('Pehle prashn likho ya bolo 🙏');return;}

  // Reset input immediately
  inp.value='';

  // Lock
  BUSY=true;
  document.getElementById('sndb').disabled=true;
  inp.disabled=true;

  showGod(true);
  particles();
  setst('देव ध्यान कर रहे हैं... ✨');
  showLdr(true);

  try{
    await sleep(1000);
    const ans=getAns(q,CUR);
    showLdr(false);

    // Type text
    await typeIt(ans);

    // Sound waves
    waves();
    setst('देव वाणी बोल रहे हैं ✨');

    // Speaking animation
    document.getElementById('godface').classList.add('speaking');
    startMouthAnim();

    // SPEAK - always works even without ElevenLabs
    await speakIt(ans,GODS[CUR].vid);

  }catch(err){
    console.error(err);
    showLdr(false);
    toast('Kuch galat hua, dobara try karein');
  }finally{
    // ALWAYS UNLOCK — this fixes the bug
    stopMouthAnim();
    document.getElementById('godface').classList.remove('speaking');
    BUSY=false;
    document.getElementById('sndb').disabled=false;
    inp.disabled=false;
    inp.focus();
    setst('प्रश्न पूछें — ब्रह्मांड सुन रहा है 🙏');
    setTimeout(hideGod,6000);
  }
}

// ════════════════════════════════════════════
// TYPE TEXT
// ════════════════════════════════════════════
function typeIt(txt){
  return new Promise(res=>{
    const el=document.getElementById('atxt'),wr=document.getElementById('awrap');
    el.textContent='';el.className='typing';
    wr.classList.add('show');
    let i=0;
    const iv=setInterval(()=>{
      if(i<txt.length){el.textContent+=txt[i];i++;}
      else{clearInterval(iv);el.className='';res();}
    },25);
  });
}

// ════════════════════════════════════════════
// SPEAK — Fixed: always falls back to browser
// ════════════════════════════════════════════
async function speakIt(txt,vid){
  return new Promise(async res=>{
    // Try ElevenLabs first if key present
    if(EKEY){
      try{
        const r=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${vid}`,{
          method:'POST',
          headers:{'xi-api-key':EKEY,'Content-Type':'application/json'},
          body:JSON.stringify({
            text:txt,
            model_id:'eleven_multilingual_v2',
            voice_settings:{stability:.42,similarity_boost:.82,style:.38,use_speaker_boost:true}
          })
        });
        if(!r.ok) throw new Error('ElevenLabs failed');
        const blob=await r.blob();
        const url=URL.createObjectURL(blob);
        const audio=new Audio(url);
        audio.onended=()=>{URL.revokeObjectURL(url);res();};
        audio.onerror=()=>{URL.revokeObjectURL(url);spkBrowser(txt).then(res);};
        audio.play().catch(()=>spkBrowser(txt).then(res));
        return;
      }catch(e){
        // Fall through to browser TTS
      }
    }
    // Browser TTS — always works
    await spkBrowser(txt);
    res();
  });
}

function spkBrowser(txt){
  return new Promise(res=>{
    if(!('speechSynthesis' in window)){setTimeout(res,3000);return;}

    // Cancel any ongoing speech
    window.speechSynthesis.cancel();

    const u=new SpeechSynthesisUtterance(txt);

    // Get voices - wait for them to load
    let voices=window.speechSynthesis.getVoices();
    if(voices.length===0){
      window.speechSynthesis.onvoiceschanged=()=>{
        voices=window.speechSynthesis.getVoices();
        assignVoice();
      };
    } else assignVoice();

    function assignVoice(){
      const v=voices.find(x=>x.lang.startsWith('hi'))||
               voices.find(x=>x.lang.startsWith('en-IN'))||
               voices.find(x=>x.lang.includes('IN'))||
               voices[0];
      if(v) u.voice=v;
      u.lang='hi-IN';
      u.rate=0.82;
      u.pitch=0.75;
      u.volume=1;

      u.onend=()=>res();
      u.onerror=()=>res();

      // Safety timeout
      const timeout=setTimeout(()=>res(),txt.length*100+5000);
      u.onend=()=>{clearTimeout(timeout);res();};
      u.onerror=()=>{clearTimeout(timeout);res();};

      window.speechSynthesis.speak(u);
    }

    if(voices.length>0) assignVoice();
  });
}

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
function showLdr(on){document.getElementById('ldr').classList.toggle('show',on);}
function setst(m){document.getElementById('status').textContent=m;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function waves(){
  document.querySelectorAll('.sw').forEach(w=>{
    w.classList.remove('go');void w.offsetWidth;w.classList.add('go');
  });
}
function particles(){
  for(let i=0;i<28;i++){
    const p=document.createElement('div');p.className='pt';
    const sz=Math.random()*10+3,h=25+Math.random()*45;
    p.style.cssText=`width:${sz}px;height:${sz}px;background:hsl(${h},100%,65%);box-shadow:0 0 8px hsl(${h},100%,55%);left:50%;top:55%;--tx:${(Math.random()-.5)*380}px;--ty:${(Math.random()-.85)*320}px;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1800);
  }
}
function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}

// ════════════════════════════════════════════
// ENTER
// ════════════════════════════════════════════
function enter(){
  const intro=document.getElementById('intro');
  intro.style.opacity='0';
  setTimeout(()=>intro.remove(),1600);
  startMusic();

  // Preload voices
  if('speechSynthesis' in window){
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
  }

  loadS();
  drawFace('shiva',0,0,false);
  document.getElementById('gaura').style.background=GODS.shiva.aura;

  // Enter key support
  document.getElementById('qinp').addEventListener('keydown',e=>{
    if(e.key==='Enter') ask();
  });
}

window.addEventListener('load',()=>{
  if('speechSynthesis' in window){
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
  }
});
