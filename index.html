<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>🕉️ Divine AI - TV Serial Gods</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    :root {
      --primary: #ffd700; --secondary: #ff6b6b; --accent: #4ecdc4;
      --dark: #0a0a1a; --glass: rgba(20, 20, 40, 0.85);
      --glass-border: rgba(100, 200, 255, 0.3); --text: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Rajdhani', sans-serif; background: var(--dark);
      color: var(--text); overflow-x: hidden; min-height: 100vh;
    }
    #universe-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -2; background: radial-gradient(ellipse at bottom, #1a1a3a 0%, #0a0a1a 100%);
    }
    .particle {
      position: fixed; width: 3px; height: 3px; background: var(--primary);
      border-radius: 50%; animation: float 15s infinite linear;
      opacity: 0.6; pointer-events: none; z-index: -1;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
    }
    header {
      text-align: center; padding: 15px;
      background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(100,200,255,0.1));
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
    }
    header h1 {
      font-size: 1.6rem; color: var(--primary);
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
    }
    header p { color: #aaa; font-size: 0.9rem; margin-top: 5px; }
    
    /* God Stage */
    #god-stage {
      display: flex; justify-content: center; align-items: center;
      min-height: 320px; padding: 10px; position: relative;
    }
    #hologram-god {
      position: relative; width: 220px; height: 300px;
      filter: drop-shadow(0 0 25px rgba(100, 200, 255, 0.8))
              drop-shadow(0 0 50px rgba(255, 215, 0, 0.5));
      animation: hologram-float 4s ease-in-out infinite;
      display: none;
    }
    #hologram-god.visible { display: block; animation: hologram-appear 0.6s ease forwards; }
    @keyframes hologram-float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-12px) scale(1.03); }
    }
    @keyframes hologram-appear {
      from { opacity: 0; transform: scale(0.85) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    
    /* Hologram Effect */
    #god-image {
      width: 100%; height: 100%; object-fit: contain;
      border-radius: 16px;
      background: repeating-linear-gradient(
        0deg,
        rgba(100, 200, 255, 0.08) 0px,
        rgba(100, 200, 255, 0.08) 2px,
        transparent 4px,
        transparent 6px
      );
      position: relative;
    }
    #god-image::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(180deg, 
        transparent 0%, 
        rgba(255,255,255,0.15) 50%, 
        transparent 100%);
      animation: scanline 3s linear infinite;
      pointer-events: none;
    }
    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }
    
    /* Eye Contact */
    #eye-contact-overlay {
      position: absolute; top: 32%; left: 50%; transform: translate(-50%, -50%);
      width: 70px; height: 22px;
      background: radial-gradient(ellipse at center, 
        rgba(255,255,255,0.95) 0%, 
        rgba(255,215,0,0.7) 40%, 
        transparent 70%);
      border-radius: 50%;
      animation: blink 5s infinite, pulse 2s ease-in-out infinite;
      pointer-events: none; z-index: 5; opacity: 0.85;
    }
    @keyframes blink {
      0%, 45%, 50%, 100% { transform: translate(-50%, -50%) scaleY(1); }
      47% { transform: translate(-50%, -50%) scaleY(0.1); }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 12px rgba(255,215,0,0.5); }
      50% { box-shadow: 0 0 30px rgba(255,215,0,0.9); }
    }
    
    /* Reaction Bubble */
    #reaction-bubble {
      position: absolute; bottom: -45px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, rgba(255,215,0,0.95), rgba(255,107,107,0.9));
      color: #1a1a3a; padding: 10px 20px; border-radius: 25px;
      font-weight: 600; font-size: 0.95rem;
      box-shadow: 0 5px 25px rgba(255,215,0,0.4);
      animation: pop-in 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 10; max-width: 220px; text-align: center; display: none;
    }
    #reaction-bubble.show { display: block; }
    @keyframes pop-in {
      from { opacity: 0; transform: translateX(-50%) scale(0.7) translateY(15px); }
      to { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
    }
    
    /* Control Panel */
    #control-panel {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 20px; padding: 16px; margin: 0 12px 16px;
      backdrop-filter: blur(20px);
    }
    
    /* Music & Voice Controls */
    #music-controls, #voice-controls {
      display: flex; gap: 10px; margin-bottom: 12px; align-items: center; flex-wrap: wrap;
    }
    #music-controls button, #voice-controls button {
      flex: 1; padding: 8px 12px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #6a11cb, #2575fc); color: white;
      font-weight: 600; cursor: pointer; font-size: 0.9rem;
      transition: all 0.3s ease;
    }
    #voice-controls button {
      background: linear-gradient(135deg, #9b59b6, #8e44ad);
    }
    #music-controls button:hover, #voice-controls button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(37, 117, 252, 0.4);
    }
    #music-controls select {
      flex: 2; padding: 8px; border-radius: 10px; border: 1px solid var(--glass-border);
      background: rgba(30,30,60,0.9); color: white; font-family: inherit; font-size: 0.9rem;
    }
    
    /* Voice Selector Panel */
    #voice-selector {
      display: none; margin-bottom: 12px; padding: 12px;
      background: rgba(155, 89, 182, 0.2);
      border-radius: 12px;
      border: 1px solid rgba(155, 89, 182, 0.4);
    }
    #voice-selector label {
      display: block; margin-bottom: 8px;
      font-weight: 600; color: #d2b4de;
    }
    #voice-selector select {
      width: 100%; padding: 8px; border-radius: 8px;
      border: 1px solid rgba(155, 89, 182, 0.5);
      background: rgba(30,30,60,0.9);
      color: white; font-family: inherit; font-size: 0.95rem;
    }
    
    /* Input Area */
    #user-query {
      width: 100%; min-height: 65px; padding: 12px 14px;
      border-radius: 12px; border: 2px solid var(--glass-border);
      background: rgba(15,15,35,0.9); color: white;
      font-family: inherit; font-size: 1rem; resize: vertical;
      transition: all 0.3s ease;
    }
    #user-query:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.15); }
    #user-query::placeholder { color: #888; }
    .input-buttons { display: flex; gap: 10px; margin-top: 10px; }
    .input-buttons button {
      flex: 1; padding: 10px 14px; border: none; border-radius: 10px;
      font-weight: 600; cursor: pointer; color: white; font-size: 0.95rem;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all 0.3s ease;
    }
    #voice-btn { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
    #voice-btn.listening { animation: pulse-red 1.5s infinite; background: #ff4757; }
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4); }
      50% { box-shadow: 0 0 0 12px rgba(255, 71, 87, 0); }
    }
    #send-btn { background: linear-gradient(135deg, #4ecdc4, #44a08d); }
    .input-buttons button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    .input-buttons button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    #voice-status {
      margin-top: 8px; color: var(--accent); font-style: italic;
      text-align: center; font-size: 0.9rem; display: none;
    }
    #voice-status.show { display: block; }
    
    /* Response Area */
    #response-area {
      margin-top: 16px; padding: 14px;
      background: rgba(30,30,60,0.7); border-radius: 12px;
      border-left: 4px solid var(--primary); display: none;
    }
    #response-area.show { display: block; animation: slideUp 0.4s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    #god-response { line-height: 1.6; margin-bottom: 12px; font-size: 1.02rem; }
    #god-response em { color: var(--accent); font-style: normal; }
    #speak-response {
      width: 100%; padding: 10px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #a29bfe, #6c5ce7);
      color: white; font-weight: 600; cursor: pointer;
      transition: all 0.3s ease;
    }
    #speak-response:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(108, 92, 231, 0.4); }
    
    /* God Chips */
    .god-chips {
      display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto;
      padding-bottom: 5px; scrollbar-width: none;
    }
    .god-chips::-webkit-scrollbar { display: none; }
    .god-chip {
      padding: 7px 14px; background: rgba(100,200,255,0.15);
      border: 1px solid var(--glass-border); border-radius: 18px;
      font-size: 0.85rem; white-space: nowrap; cursor: pointer;
      transition: all 0.25s ease;
    }
    .god-chip:hover, .god-chip.active {
      background: linear-gradient(135deg, rgba(255,215,0,0.25), rgba(100,200,255,0.25));
      border-color: var(--primary); transform: translateY(-2px);
    }
    .god-chip.active { box-shadow: 0 0 15px rgba(255,215,0,0.35); font-weight: 600; }
    
    /* Krishna Special Effect */
    #hologram-god.krishna-active {
      filter: drop-shadow(0 0 28px rgba(251, 191, 36, 0.95))
              drop-shadow(0 0 55px rgba(30, 58, 138, 0.75));
      animation: krishna-float 3s ease-in-out infinite;
    }
    @keyframes krishna-float {
      0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
      50% { transform: translateY(-14px) scale(1.04) rotate(1deg); }
    }
    .particle.krishna {
      background: linear-gradient(135deg, #fbbf24, #1e3a8a, #10b981);
      animation: float-krishna 12s infinite linear;
    }
    @keyframes float-krishna {
      0% { transform: translateY(100vh) rotate(0deg) scale(1); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) rotate(720deg) scale(0.5); opacity: 0; }
    }
    
    /* Shiva Special Effect */
    #hologram-god.shiva-active {
      filter: drop-shadow(0 0 28px rgba(78, 205, 196, 0.9))
              drop-shadow(0 0 55px rgba(44, 62, 80, 0.8));
    }
    
    footer { text-align: center; padding: 12px; color: #666; font-size: 0.8rem; }
    @media (max-width: 480px) {
      #hologram-god { width: 180px; height: 250px; }
      header h1 { font-size: 1.4rem; }
      .input-buttons { flex-direction: column; }
      .input-buttons button { width: 100%; }
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="universe-container"></div>
  <div id="particles"></div>
  
  <header>
    <h1><i class="fas fa-om"></i> Divine AI</h1>
    <p>TV Serial Style Hologram Gods ✨</p>
  </header>
  
  <!-- God Selection Chips -->
  <div class="god-chips">
    <div class="god-chip active" data-god="generic">🌌 Cosmic</div>
    <div class="god-chip" data-god="shiva">🕉️ Shiva</div>
    <div class="god-chip" data-god="vishnu">🪷 Vishnu</div>
    <div class="god-chip" data-god="durga">🦁 Durga</div>
    <div class="god-chip" data-god="ganesh">🐘 Ganesh</div>
    <div class="god-chip" data-god="krishna">🦚 Krishna</div>
  </div>
  
  <div id="god-stage">
    <div id="hologram-god">
      <img id="god-image" src="" alt="Divine Form" />
      <div id="eye-contact-overlay"></div>
      <div id="reaction-bubble">🙏</div>
    </div>
  </div>

  <div id="control-panel">
    <!-- Music Controls -->
    <div id="music-controls">
      <button id="toggle-music"><i class="fas fa-volume-up"></i> <span id="music-text">ON</span></button>
      <select id="music-select">
        <option value="cosmic">🌌 Cosmic</option>
        <option value="shiva">🕉️ Shiva Flute</option>
        <option value="vishnu">🪷 Vishnu Conch</option>
        <option value="krishna">🦚 Krishna Bansuri</option>
        <option value="durga">🦁 Durga Damru</option>
      </select>
    </div>

    <!-- Voice Settings Button -->
    <div id="voice-controls">
      <button id="toggle-voice-settings">
        <i class="fas fa-voice"></i> Voice Settings
      </button>
    </div>

    <!-- Voice Gender Selector (Hidden by default) -->
    <div id="voice-selector">
      <label>
        <i class="fas fa-mars-venus"></i> Voice Type:
      </label>
      <select id="voice-gender">
        <option value="female">👩 Female (Sweet)</option>
        <option value="male">👨 Male (Deep)</option>
        <option value="auto" selected>🤖 Auto (Best Available)</option>
      </select>
    </div>

    <!-- Input Area -->
    <div id="input-area">
      <textarea id="user-query" placeholder="🙏 Apna prashn likhiye ya mic dabayein..."></textarea>
      <div class="input-buttons">
        <button id="voice-btn"><i class="fas fa-microphone"></i> <span id="voice-text">Sunna</span></button>
        <button id="send-btn"><i class="fas fa-paper-plane"></i> Bhejiye</button>
      </div>
      <div id="voice-status"><i class="fas fa-wave-square"></i> Sun raha hoon...</div>
    </div>

    <!-- Response Area -->
    <div id="response-area">
      <div id="god-response"></div>
      <button id="speak-response"><i class="fas fa-volume-high"></i> Suniye</button>
    </div>
  </div>

  <audio id="bg-music" loop></audio>
  <footer>Divine AI © 2024 | Radhe Radhe 🦚</footer>

  <script src="script.js"></script>
  
  <!-- Particles -->
  <script>
    function createParticles() {
      const container = document.getElementById('particles');
      for(let i=0; i<30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random()*100+'vw';
        p.style.animationDelay = Math.random()*15+'s';
        p.style.animationDuration = (15 + Math.random()*20)+'s';
        container.appendChild(p);
      }
    }
    document.addEventListener('DOMContentLoaded', createParticles);
  </script>
  
  <!-- Voice Settings Toggle -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const toggleBtn = document.getElementById('toggle-voice-settings');
      const selector = document.getElementById('voice-selector');
      
      if (toggleBtn && selector) {
        toggleBtn.addEventListener('click', () => {
          if (selector.style.display === 'none' || selector.style.display === '') {
            selector.style.display = 'block';
            toggleBtn.innerHTML = '<i class="fas fa-chevron-up"></i> Hide Voice Settings';
          } else {
            selector.style.display = 'none';
            toggleBtn.innerHTML = '<i class="fas fa-voice"></i> Voice Settings';
          }
        });
      }
    });
  </script>
</body>
</html>
