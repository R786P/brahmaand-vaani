<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ब्रह्माण्ड वाणी — Divine Oracle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Pro:wght@300;400;600&display=swap');
:root{--gold:#f5c842;--gold2:#e8a020;--divine:#fff8e7;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100vw;height:100vh;overflow:hidden;background:#000;color:var(--divine);font-family:'Crimson Pro',serif;}
#cvs{position:fixed;inset:0;z-index:0;}
.neb{position:fixed;border-radius:50%;filter:blur(100px);z-index:1;pointer-events:none;}
.n1{width:800px;height:600px;background:radial-gradient(ellipse,rgba(90,0,180,0.5) 0%,transparent 70%);top:-20%;left:-20%;animation:nb 28s ease-in-out infinite alternate;}
.n2{width:700px;height:700px;background:radial-gradient(ellipse,rgba(0,20,120,0.55) 0%,transparent 70%);bottom:-20%;right:-20%;animation:nb 35s ease-in-out infinite alternate-reverse;}
.n3{width:400px;height:400px;background:radial-gradient(ellipse,rgba(180,0,50,0.35) 0%,transparent 70%);top:20%;right:10%;animation:nb 20s ease-in-out infinite alternate;}
.n4{width:300px;height:300px;background:radial-gradient(ellipse,rgba(0,120,100,0.25) 0%,transparent 70%);bottom:20%;left:8%;animation:nb 24s ease-in-out infinite alternate-reverse;}
@keyframes nb{0%{transform:translate(0,0) scale(1);}100%{transform:translate(50px,40px) scale(1.2);}}
.gr{position:fixed;top:50%;left:50%;border-radius:50%;border:1px solid rgba(200,160,255,0.07);transform:translate(-50%,-50%) rotateX(72deg);animation:grot 70s linear infinite;z-index:1;pointer-events:none;}
.gr:nth-child(1){width:1000px;height:1000px;}.gr:nth-child(2){width:720px;height:720px;border-color:rgba(150,220,255,0.05);animation-duration:50s;}.gr:nth-child(3){width:480px;height:480px;border-color:rgba(255,220,100,0.04);animation-duration:32s;}
@keyframes grot{to{transform:translate(-50%,-50%) rotateX(72deg) rotateZ(360deg);}}

/* TITLE */
#tbar{position:fixed;top:22px;left:50%;transform:translateX(-50%);text-align:center;z-index:30;pointer-events:none;}
#tbar h1{font-family:'Cinzel Decorative',cursive;font-size:clamp(0.95rem,2.2vw,1.85rem);color:var(--gold);text-shadow:0 0 30px rgba(245,200,66,0.9),0 0 70px rgba(245,200,66,0.4);letter-spacing:5px;white-space:nowrap;}
#tbar p{font-size:0.65rem;color:rgba(255,248,231,0.32);letter-spacing:9px;margin-top:3px;font-style:italic;}

/* GEAR ICON */
#gear{position:fixed;top:18px;left:18px;z-index:200;width:44px;height:44px;border-radius:50%;background:rgba(5,2,16,0.6);border:1px solid rgba(245,200,66,0.2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.15rem;backdrop-filter:blur(10px);transition:all 0.3s;}
#gear:hover{border-color:var(--gold);box-shadow:0 0 20px rgba(245,200,66,0.4);transform:rotate(30deg);}

/* SETTINGS MODAL */
#smod{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity 0.3s;}
#smod.open{opacity:1;pointer-events:all;}
#sbox{background:linear-gradient(135deg,rgba(8,3,25,0.97),rgba(30,8,70,0.95));border:1px solid rgba(245,200,66,0.25);border-radius:24px;padding:32px;width:min(360px,92vw);box-shadow:0 0 60px rgba(100,0,200,0.4);}
#sbox h2{font-family:'Cinzel Decorative',cursive;font-size:0.85rem;color:var(--gold);letter-spacing:3px;text-align:center;margin-bottom:22px;}
.sf{margin-bottom:16px;}
.sf label{font-size:0.62rem;letter-spacing:2px;color:rgba(255,248,231,0.45);display:block;margin-bottom:6px;text-transform:uppercase;}
.sf input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(245,200,66,0.18);border-radius:10px;padding:11px 14px;font-size:0.85rem;color:var(--divine);outline:none;font-family:'Crimson Pro',serif;transition:border-color 0.3s;}
.sf input:focus{border-color:rgba(245,200,66,0.6);}
.sf input::placeholder{color:rgba(255,248,231,0.18);font-size:0.75rem;}
.sf small{font-size:0.6rem;color:rgba(255,248,231,0.3);margin-top:5px;display:block;line-height:1.6;}
.sf small a{color:rgba(245,200,66,0.6);text-decoration:none;}
#svbtn{width:100%;padding:12px;background:linear-gradient(135deg,var(--gold2),var(--gold));border:none;border-radius:10px;color:#1a0800;font-family:'Cinzel Decorative',cursive;font-size:0.72rem;letter-spacing:2px;cursor:pointer;transition:all 0.3s;margin-top:4px;}
#svbtn:hover{box-shadow:0 0 25px rgba(245,200,66,0.6);transform:scale(1.02);}
#clsbtn{width:100%;padding:10px;background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:rgba(255,248,231,0.4);font-size:0.8rem;cursor:pointer;margin-top:10px;transition:all 0.3s;}
#clsbtn:hover{border-color:rgba(255,255,255,0.3);color:rgba(255,248,231,0.7);}

/* GOD SELECTOR */
#gpanel{position:fixed;right:16px;top:50%;transform:translateY(-50%);z-index:30;display:flex;flex-direction:column;gap:8px;align-items:center;}
#gpanel>span{font-size:0.52rem;letter-spacing:2px;color:rgba(245,200,66,0.5);text-transform:uppercase;writing-mode:vertical-rl;margin-bottom:4px;}
.gb{width:50px;height:50px;border-radius:13px;border:1.5px solid rgba(245,200,66,0.2);background:rgba(5,2,16,0.65);cursor:pointer;transition:all 0.3s;display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(10px);gap:1px;}
.gb .gi{font-size:1.4rem;line-height:1;}.gb .gn{font-size:0.32rem;color:rgba(245,200,66,0.6);letter-spacing:0.5px;}
.gb:hover,.gb.on{border-color:var(--gold);box-shadow:0 0 18px rgba(245,200,66,0.55),inset 0 0 18px rgba(245,200,66,0.08);transform:scale(1.08);background:rgba(15,6,40,0.85);}

/* GOD SCENE */
#gscene{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(480px,94vw);height:68vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;opacity:0;transition:opacity 0.9s ease;pointer-events:none;z-index:20;}
#gscene.vis{opacity:1;}

/* Mandala */
#mandala{position:absolute;bottom:110px;left:50%;transform:translateX(-50%);width:320px;height:320px;opacity:0.15;animation:mspin 25s linear infinite;}
@keyframes mspin{to{transform:translateX(-50%) rotate(360deg);}}

/* Aura */
#gaura{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px;height:280px;border-radius:50%;filter:blur(45px);animation:abreathe 3s ease-in-out infinite;}
@keyframes abreathe{0%,100%{transform:translateX(-50%) scale(1);opacity:0.6;}50%{transform:translateX(-50%) scale(1.2);opacity:1;}}

/* SVG wrap */
#gwrap{position:relative;z-index:10;width:210px;height:270px;animation:ghover 5s ease-in-out infinite;margin-bottom:8px;filter:drop-shadow(0 0 40px rgba(245,200,66,0.65));transition:filter 0.5s;}
@keyframes ghover{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);}}
#gwrap.speaking{animation:ghover 5s ease-in-out infinite,gspk 0.4s ease-in-out infinite alternate;}
@keyframes gspk{from{filter:drop-shadow(0 0 28px rgba(245,200,66,0.55));}to{filter:drop-shadow(0 0 70px rgba(245,200,66,1)) drop-shadow(0 0 20px #fff3);}}
#gwrap.listening{animation:glis 0.65s ease-in-out infinite alternate;}
@keyframes glis{from{transform:translateY(-8px) rotate(-4deg);filter:drop-shadow(0 0 28px rgba(100,210,255,0.8));}to{transform:translateY(-16px) rotate(4deg);filter:drop-shadow(0 0 55px rgba(100,210,255,1));}}

#gname{font-family:'Cinzel Decorative',cursive;color:var(--gold);font-size:0.9rem;letter-spacing:5px;text-shadow:0 0 25px rgba(245,200,66,0.9);margin-bottom:8px;}

/* Sound waves */
#swaves{position:fixed;bottom:210px;left:50%;transform:translateX(-50%);pointer-events:none;}
.sw{position:absolute;width:130px;height:130px;border-radius:50%;border:2px solid rgba(245,200,66,0.4);top:50%;left:50%;transform:translate(-50%,-50%) scale(0);opacity:0;}
.sw.go{animation:swgo 2.3s ease-out forwards;}
.sw:nth-child(2){animation-delay:0.38s;}.sw:nth-child(3){animation-delay:0.76s;}
@keyframes swgo{0%{transform:translate(-50%,-50%) scale(0);opacity:0.85;}100%{transform:translate(-50%,-50%) scale(3.8);opacity:0;}}

/* ANSWER BUBBLE */
#awrap{position:fixed;bottom:165px;left:50%;transform:translateX(-50%) translateY(12px);width:min(510px,90vw);z-index:25;opacity:0;pointer-events:none;transition:opacity 0.5s,transform 0.5s;}
#awrap.show{opacity:1;transform:translateX(-50%) translateY(0);}
#abox{background:linear-gradient(135deg,rgba(10,3,30,0.95),rgba(35,8,80,0.92));border:1px solid rgba(245,200,66,0.28);border-radius:22px;padding:18px 24px;text-align:center;font-size:1.02rem;line-height:1.8;backdrop-filter:blur(28px);box-shadow:0 8px 60px rgba(80,0,200,0.3);}
#abox::after{content:'';position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);border:13px solid transparent;border-top-color:rgba(245,200,66,0.22);}
#atxt{display:block;}
#atxt.typing::after{content:'|';animation:blk 0.6s step-end infinite;color:var(--gold);}
@keyframes blk{50%{opacity:0;}}

/* STATUS */
#status{position:fixed;bottom:118px;left:50%;transform:translateX(-50%);font-size:0.7rem;letter-spacing:3px;color:rgba(255,248,231,0.3);text-transform:uppercase;white-space:nowrap;z-index:25;transition:all 0.4s;}

/* INPUT */
#ibar{position:fixed;bottom:35px;left:50%;transform:translateX(-50%);display:flex;gap:10px;align-items:center;width:min(630px,90vw);z-index:30;}
#qinp{flex:1;background:rgba(6,2,20,0.88);border:1px solid rgba(245,200,66,0.28);border-radius:50px;padding:15px 22px;font-size:1rem;font-family:'Crimson Pro',serif;color:var(--divine);outline:none;backdrop-filter:blur(22px);transition:all 0.35s;box-shadow:0 0 22px rgba(80,0,200,0.15);}
#qinp:focus{border-color:rgba(245,200,66,0.65);box-shadow:0 0 35px rgba(245,200,66,0.2);}
#qinp::placeholder{color:rgba(255,248,231,0.22);}
.ib{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;font-size:1.2rem;transition:all 0.3s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#micb{background:linear-gradient(135deg,#120830,#380f70);border:1.5px solid rgba(245,200,66,0.28);box-shadow:0 0 18px rgba(100,0,200,0.35);position:relative;}
#micb:hover{transform:scale(1.1);box-shadow:0 0 30px rgba(100,0,200,0.6);}
#micb.on{background:linear-gradient(135deg,#001830,#004870);border-color:rgba(80,200,255,0.8);box-shadow:0 0 30px rgba(0,160,255,0.65);animation:mpulse 0.55s ease-in-out infinite alternate;}
@keyframes mpulse{to{transform:scale(1.15);}}
.mr{position:absolute;inset:-6px;border-radius:50%;border:2px solid rgba(80,200,255,0.3);animation:mring 1.1s ease-out infinite;display:none;}
.mr:nth-child(2){inset:-13px;animation-delay:0.5s;}
#micb.on .mr{display:block;}
@keyframes mring{0%{transform:scale(1);opacity:0.7;}100%{transform:scale(1.5);opacity:0;}}
#sndb{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#1a0800;box-shadow:0 0 22px rgba(245,200,66,0.4);}
#sndb:hover{transform:scale(1.1);box-shadow:0 0 40px rgba(245,200,66,0.75);}
#sndb:disabled{opacity:0.35;cursor:not-allowed;transform:none;}

/* LOADER */
#ldr{position:fixed;bottom:122px;left:50%;transform:translateX(-50%);display:none;gap:7px;z-index:26;}
#ldr.show{display:flex;}
.ld{width:9px;height:9px;border-radius:50%;background:var(--gold);opacity:0.25;animation:ldot 1.3s ease-in-out infinite;}
.ld:nth-child(2){animation-delay:0.22s;}.ld:nth-child(3){animation-delay:0.44s;}
@keyframes ldot{0%,100%{opacity:0.2;transform:scale(0.75);}50%{opacity:1;transform:scale(1.25);}}

/* PARTICLES */
.pt{position:fixed;border-radius:50%;pointer-events:none;z-index:50;animation:pf 1.7s ease-out forwards;}
@keyframes pf{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0);}}

/* TOAST */
#toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.88);color:var(--divine);padding:10px 22px;border-radius:50px;font-size:0.8rem;z-index:300;opacity:0;transition:opacity 0.3s;border:1px solid rgba(245,200,66,0.2);white-space:nowrap;backdrop-filter:blur(12px);}
#toast.show{opacity:1;}

/* INTRO */
#intro{position:fixed;inset:0;background:#000;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity 1.6s;}
#iom{font-size:5rem;animation:omg 2s ease-in-out infinite alternate;line-height:1;}
@keyframes omg{from{filter:drop-shadow(0 0 15px rgba(245,200,66,0.4));}to{filter:drop-shadow(0 0 80px rgba(245,200,66,1));}}
#intro h1{font-family:'Cinzel Decorative',cursive;font-size:clamp(1.5rem,5vw,3.2rem);color:var(--gold);text-shadow:0 0 60px rgba(245,200,66,0.8);text-align:center;opacity:0;animation:iup 2s ease 0.8s forwards;}
#intro p{color:rgba(255,248,231,0.45);letter-spacing:7px;font-size:0.82rem;text-align:center;opacity:0;animation:iup 2s ease 1.8s forwards;}
#ibtn{margin-top:22px;padding:15px 50px;background:transparent;border:1.5px solid var(--gold);color:var(--gold);font-family:'Cinzel Decorative',cursive;font-size:0.85rem;letter-spacing:4px;cursor:pointer;border-radius:50px;transition:all 0.4s;opacity:0;animation:iup 2s ease 2.8s forwards;}
#ibtn:hover{background:rgba(245,200,66,0.12);box-shadow:0 0 40px rgba(245,200,66,0.5);transform:scale(1.06);}
@keyframes iup{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div id="intro">
  <div id="iom">🕉️</div>
  <h1>ब्रह्माण्ड वाणी</h1>
  <p>DIVINE ORACLE · COSMIC CONSCIOUSNESS</p>
  <button id="ibtn" onclick="enter()">प्रवेश करें ✨</button>
</div>

<canvas id="cvs"></canvas>
<div class="neb n1"></div><div class="neb n2"></div><div class="neb n3"></div><div class="neb n4"></div>
<div class="gr"></div><div class="gr"></div><div class="gr"></div>

<div id="tbar"><h1>🕉️ ब्रह्माण्ड वाणी</h1><p>DIVINE ORACLE</p></div>

<div id="gear" onclick="openS()" title="Settings">⚙️</div>

<div id="smod">
  <div id="sbox">
    <h2>⚙️ DIVINE SETTINGS</h2>
    <div class="sf">
      <label>ElevenLabs API Key — Madhur Awaaz</label>
      <input type="password" id="ekey" placeholder="sk_xxxxxxxxxxxxxxxx"/>
      <small>Free: <a href="https://elevenlabs.io" target="_blank">elevenlabs.io</a> → Sign Up → Profile → API Key<br/>10,000 characters/month bilkul free! 🎁</small>
    </div>
    <button id="svbtn" onclick="saveS()">✨ DIVINE VOICE ACTIVATE</button>
    <button id="clsbtn" onclick="closeS()">बंद करें ✕</button>
  </div>
</div>

<div id="gpanel">
  <span>देव चुनें</span>
  <button class="gb on" id="g-shiva" onclick="chgod('shiva')"><span class="gi">🔱</span><span class="gn">SHIVA</span></button>
  <button class="gb" id="g-krishna" onclick="chgod('krishna')"><span class="gi">🦚</span><span class="gn">KRISHNA</span></button>
  <button class="gb" id="g-ganesh" onclick="chgod('ganesh')"><span class="gi">🐘</span><span class="gn">GANESH</span></button>
  <button class="gb" id="g-durga" onclick="chgod('durga')"><span class="gi">⚔️</span><span class="gn">DURGA</span></button>
  <button class="gb" id="g-vishnu" onclick="chgod('vishnu')"><span class="gi">🌊</span><span class="gn">VISHNU</span></button>
  <button class="gb" id="g-brahma" onclick="chgod('brahma')"><span class="gi">✨</span><span class="gn">BRAHMA</span></button>
</div>

<div id="swaves"><div class="sw"></div><div class="sw"></div><div class="sw"></div></div>

<div id="gscene">
  <svg id="mandala" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="rgba(245,200,66,0.9)" stroke-width="0.5">
      <circle cx="100" cy="100" r="95"/><circle cx="100" cy="100" r="78"/><circle cx="100" cy="100" r="62"/>
      <circle cx="100" cy="100" r="46"/><circle cx="100" cy="100" r="30"/>
      <line x1="100" y1="5" x2="100" y2="195"/><line x1="5" y1="100" x2="195" y2="100"/>
      <line x1="30" y1="30" x2="170" y2="170"/><line x1="170" y1="30" x2="30" y2="170"/>
      <polygon points="100,18 120,85 190,100 120,115 100,182 80,115 10,100 80,85" stroke="rgba(245,200,66,0.7)" fill="rgba(245,200,66,0.02)"/>
      <polygon points="100,32 152,78 152,122 100,168 48,122 48,78" stroke="rgba(245,200,66,0.45)" fill="none"/>
      <circle cx="100" cy="18" r="4.5" fill="rgba(245,200,66,0.7)"/><circle cx="100" cy="182" r="4.5" fill="rgba(245,200,66,0.7)"/>
      <circle cx="18" cy="100" r="4.5" fill="rgba(245,200,66,0.7)"/><circle cx="182" cy="100" r="4.5" fill="rgba(245,200,66,0.7)"/>
      <circle cx="40" cy="40" r="3" fill="rgba(245,200,66,0.55)"/><circle cx="160" cy="40" r="3" fill="rgba(245,200,66,0.55)"/>
      <circle cx="40" cy="160" r="3" fill="rgba(245,200,66,0.55)"/><circle cx="160" cy="160" r="3" fill="rgba(245,200,66,0.55)"/>
    </g>
  </svg>
  <div id="gaura"></div>
  <div id="gwrap"></div>
  <div id="gname">भगवान शिव</div>
</div>

<div id="awrap"><div id="abox"><span id="atxt"></span></div></div>
<div id="ldr"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
<div id="status">प्रश्न पूछें — ब्रह्मांड सुन रहा है 🙏</div>

<div id="ibar">
  <button class="ib" id="micb" onclick="togMic()">🎤<div class="mr"></div><div class="mr"></div></button>
  <input id="qinp" type="text" placeholder="अपना प्रश्न यहाँ लिखें या 🎤 से बोलें..." onkeydown="if(event.key==='Enter')ask()"/>
  <button class="ib" id="sndb" onclick="ask()">⚡</button>
</div>
<div id="toast"></div>

<script>
// ══ STARS ══
const cv=document.getElementById('cvs'),cx=cv.getContext('2d');
let ST=[],SH=[];
function rsz(){cv.width=innerWidth;cv.height=innerHeight;ST=[];for(let i=0;i<420;i++)ST.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.8+0.15,ph:Math.random()*6.28,sp:Math.random()*0.3+0.04,h:185+Math.random()*90,s:55+Math.random()*35,l:65+Math.random()*30});}
window.addEventListener('resize',rsz);rsz();
let T=0;
(function loop(){cx.clearRect(0,0,cv.width,cv.height);T+=0.007;
ST.forEach(s=>{const op=0.2+0.75*Math.abs(Math.sin(T*s.sp+s.ph));cx.beginPath();cx.arc(s.x,s.y,s.r,0,6.28);cx.fillStyle=`hsla(${s.h},${s.s}%,${s.l}%,${op})`;cx.fill();});
SH=SH.filter(s=>s.op>0.01);SH.forEach(s=>{const g=cx.createLinearGradient(s.x,s.y,s.x-Math.cos(s.a)*s.l,s.y-Math.sin(s.a)*s.l);g.addColorStop(0,`rgba(255,248,200,${s.op})`);g.addColorStop(1,'transparent');cx.beginPath();cx.moveTo(s.x,s.y);cx.lineTo(s.x-Math.cos(s.a)*s.l,s.y-Math.sin(s.a)*s.l);cx.strokeStyle=g;cx.lineWidth=2;cx.stroke();s.x+=Math.cos(s.a)*s.sp;s.y+=Math.sin(s.a)*s.sp;s.op-=0.012;});
requestAnimationFrame(loop);})();
setInterval(()=>SH.push({x:Math.random()*cv.width,y:Math.random()*cv.height*0.5,l:120+Math.random()*130,sp:5+Math.random()*8,op:1,a:Math.PI/4+Math.random()*0.5}),3200);

// ══ MUSIC ══
let aud=null;
function startMusic(){
  try{aud=new(window.AudioContext||window.webkitAudioContext)();
  [[55,0],[82.4,0.018],[110,0],[165,0.012],[220,0]].forEach(([f,d],i)=>{const o=aud.createOscillator(),g=aud.createGain(),fl=aud.createBiquadFilter();o.type=i<2?'sine':'triangle';o.frequency.value=f+d*f;g.gain.setValueAtTime(0,aud.currentTime);g.gain.linearRampToValueAtTime(0.05/(i*0.4+1),aud.currentTime+5);fl.type='lowpass';fl.frequency.value=600;o.connect(fl);fl.connect(g);g.connect(aud.destination);o.start();});
  function bell(){if(!aud)return;const f=[396,528,639,741,852][Math.floor(Math.random()*5)];const o=aud.createOscillator(),g=aud.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.2,aud.currentTime);g.gain.exponentialRampToValueAtTime(0.001,aud.currentTime+6);o.connect(g);g.connect(aud.destination);o.start();o.stop(aud.currentTime+6);setTimeout(bell,5000+Math.random()*8000);}
  setTimeout(bell,2500);}catch(e){}
}

const KW={

  'paise|money|dhan|naukri|job|career|kaam|business':{shiva:'🔱 धन माया है पर ज़रूरी भी। कर्म करो निष्काम भाव से — धन स्वतः आएगा। धन को साधन बनाओ, लक्ष्य नहीं। महादेव का आशीर्वाद! 💰',krishna:'🦚 उत्कृष्टता के पीछे भागो, धन आएगा। मेहनत और ईमानदारी सदा फल देती है। हरे कृष्ण! 💰',ganesh:'🐘 नया काम शुरू करने से पहले मुझे याद करो! मेहनत + बुद्धि = सफलता। मैं विघ्न हटाऊँगा! गणपति बप्पा! 💰',durga:'⚔️ न्यायपूर्ण तरीके से कमाओ — माँ दुर्गा ऐसों की रक्षा करती है। लालच से बचो! जय माता दी! 💰',vishnu:'🌊 धर्म के मार्ग पर कमाया धन टिकाऊ होता है। सेवा से समृद्धि आती है। ॐ नमो नारायणाय! 💰',brahma:'✨ हर इंसान में एक विशेष प्रतिभा है — उसे पहचानो। ज्ञान से बड़ा कोई धन नहीं! 💰'},
  'dukh|dard|pareshan|tension|sad|udas|takleef|rona':{shiva:'🔱 दुःख को मैं जानता हूँ — मैंने स्वयं विष पिया था। दर्द तुम्हें निखारने आया है। मैं तुम्हारे साथ हूँ। ॐ नमः शिवाय! 💙',krishna:'🦚 यह दुःख स्थाई नहीं — सुख-दुःख दोनों आते-जाते हैं। तुम भी उठोगे जैसे अर्जुन उठा। राधे कृष्ण! 💛',ganesh:'🐘 दुःख में मुझे याद करो! हर समस्या का हल होता है। रात के बाद सुबह आती है! 💚',durga:'⚔️ बेटा-बेटी, माँ के पास आओ। मैं तुम्हारी बाधाएँ काट दूँगी। रोना ठीक है — हार मत मानो! ❤️',vishnu:'🌊 ध्यान करो, प्रकृति से जुड़ो। मैं सदा तुम्हारा पालन करता हूँ — तुम अकेले नहीं! 💙',brahma:'✨ दुःख-सुख दोनों जीवन के रंग हैं। यह दौर भी गुजरेगा। तुम्हारी कहानी अभी खत्म नहीं हुई! 💜'},

};
function getAns(q,g){
  const ql=q.toLowerCase();
  for(const [kw,rs] of Object.entries(KW)){if(new RegExp(kw,'i').test(ql)&&rs[g])return rs[g];}
  const pool=W[g];return pool[Math.floor(Math.random()*pool.length)];
}

// ══ STATE ══
let CUR='shiva',BUSY=false,LIS=false,REC=null,EKEY='';
let EX=0,EY=0;

function loadS(){EKEY=localStorage.getItem('elvKey')||'';if(EKEY)document.getElementById('ekey').value=EKEY;}
function saveS(){EKEY=document.getElementById('ekey').value.trim();if(!EKEY){toast('ElevenLabs key daalo!');return;}localStorage.setItem('elvKey',EKEY);closeS();toast('✨ Madhur awaaz activate ho gayi!');}
function openS(){document.getElementById('smod').classList.add('open');}
function closeS(){document.getElementById('smod').classList.remove('open');}
document.getElementById('smod').addEventListener('click',e=>{if(e.target===document.getElementById('smod'))closeS();});

// ══ RENDER GOD ══
function render(g,ex,ey){document.getElementById('gwrap').innerHTML=SVGMAP[g](ex,ey);}

function chgod(g){
  CUR=g;const god=GODS[g];
  document.getElementById('gname').textContent=god.name;
  document.getElementById('gaura').style.background=god.aura;
  document.querySelectorAll('.gb').forEach(b=>b.classList.remove('on'));
  document.getElementById('g-'+g).classList.add('on');
  render(g,EX,EY);showGod(false);
  if(!BUSY)setTimeout(hideGod,2500);
}
function showGod(wb){
  document.getElementById('gscene').classList.add('vis');
  if(!wb){document.getElementById('awrap').classList.remove('show');document.getElementById('atxt').textContent='';}
}
function hideGod(){if(BUSY)return;document.getElementById('gscene').classList.remove('vis');document.getElementById('awrap').classList.remove('show');}

// ══ EYE TRACK ══
function trackEye(cx2,cy2){
  const rect=document.getElementById('gwrap').getBoundingClientRect();
  const mx=rect.left+rect.width/2,my=rect.top+rect.height/2;
  const dx=(cx2-mx)/innerWidth,dy=(cy2-my)/innerHeight;
  EX=Math.max(-8,Math.min(8,dx*22));EY=Math.max(-6,Math.min(6,dy*20));
  render(CUR,EX,EY);
}
document.addEventListener('mousemove',e=>{if(document.getElementById('gscene').classList.contains('vis'))trackEye(e.clientX,e.clientY);});
document.addEventListener('touchmove',e=>{if(document.getElementById('gscene').classList.contains('vis')){const t=e.touches[0];trackEye(t.clientX,t.clientY);}},{passive:true});

// ══ MIC ══
function togMic(){
  if(BUSY)return;
  if(LIS){REC?.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Browser mic support nahi karta 😢');return;}
  REC=new SR();REC.lang='hi-IN';REC.continuous=false;REC.interimResults=true;
  REC.onstart=()=>{LIS=true;document.getElementById('micb').classList.add('on');document.getElementById('gwrap').classList.add('listening');showGod(false);setst('🎤 बोलिए... देव सुन रहे हैं');};
  REC.onresult=e=>{document.getElementById('qinp').value=Array.from(e.results).map(r=>r[0].transcript).join('');};
  REC.onerror=()=>{endLis();toast('Dobara try karein 🙏');};
  REC.onend=()=>{endLis();const v=document.getElementById('qinp').value.trim();if(v)ask();else{setst('Kuch suna nahi... 🙏');hideGod();}};
  REC.start();
}
function endLis(){LIS=false;document.getElementById('micb').classList.remove('on');document.getElementById('gwrap').classList.remove('listening');}

// ══ ASK ══
async function ask(){
  if(BUSY)return;
  const inp=document.getElementById('qinp');const q=inp.value.trim();
  if(!q){toast('Pehle prashn likho ya bolo 🙏');return;}
  inp.value='';BUSY=true;document.getElementById('sndb').disabled=true;
  showGod(true);particles();setst('देव ध्यान कर रहे हैं... ✨');showLdr(true);
  await sleep(1100);
  const ans=getAns(q,CUR);
  showLdr(false);await typeIt(ans);waves();
  setst('देव वाणी बोल रहे हैं ✨');document.getElementById('gwrap').classList.add('speaking');
  await speakIt(ans,GODS[CUR].vid);
  document.getElementById('gwrap').classList.remove('speaking');
  BUSY=false;document.getElementById('sndb').disabled=false;
  setst('प्रश्न पूछें — ब्रह्मांड सुन रहा है 🙏');
  setTimeout(hideGod,6000);
}

// ══ TYPE ══
function typeIt(txt){return new Promise(res=>{const el=document.getElementById('atxt'),wr=document.getElementById('awrap');el.textContent='';el.className='typing';wr.classList.add('show');let i=0;const iv=setInterval(()=>{if(i<txt.length){el.textContent+=txt[i];i++;}else{clearInterval(iv);el.className='';res();}},26);});}

// ══ SPEAK ══
async function speakIt(txt,vid){return new Promise(async res=>{
  if(!EKEY){await spkBrowser(txt);res();return;}
  try{const r=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${vid}`,{method:'POST',headers:{'xi-api-key':EKEY,'Content-Type':'application/json'},body:JSON.stringify({text:txt,model_id:'eleven_multilingual_v2',voice_settings:{stability:0.42,similarity_boost:0.82,style:0.38,use_speaker_boost:true}})});
  if(!r.ok)throw 0;const blob=await r.blob(),url=URL.createObjectURL(blob);const a=new Audio(url);a.onended=()=>{URL.revokeObjectURL(url);res();};a.onerror=()=>res();a.play();}catch(e){await spkBrowser(txt);res();}
});}
function spkBrowser(txt){return new Promise(res=>{if(!('speechSynthesis' in window)){setTimeout(res,2000);return;}speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt);const vs=speechSynthesis.getVoices();const v=vs.find(x=>x.lang.startsWith('hi'))||vs.find(x=>x.lang.startsWith('en-IN'))||vs[0];if(v)u.voice=v;u.rate=0.8;u.pitch=0.72;u.lang='hi-IN';u.onend=u.onerror=()=>res();speechSynthesis.speak(u);});}

// ══ HELPERS ══
function showLdr(on){document.getElementById('ldr').classList.toggle('show',on);}
function setst(m){document.getElementById('status').textContent=m;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function waves(){document.querySelectorAll('.sw').forEach(w=>{w.classList.remove('go');void w.offsetWidth;w.classList.add('go');});}
function particles(){for(let i=0;i<28;i++){const p=document.createElement('div');p.className='pt';const sz=Math.random()*10+3,h=25+Math.random()*45;p.style.cssText=`width:${sz}px;height:${sz}px;background:hsl(${h},100%,65%);box-shadow:0 0 8px hsl(${h},100%,55%);left:50%;top:55%;--tx:${(Math.random()-0.5)*380}px;--ty:${(Math.random()-0.85)*320}px;`;document.body.appendChild(p);setTimeout(()=>p.remove(),1800);}}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);}

// ══ ENTER ══
function enter(){
  const in2=document.getElementById('intro');in2.style.opacity='0';setTimeout(()=>in2.remove(),1600);
  startMusic();speechSynthesis?.getVoices();loadS();
  render('shiva',0,0);document.getElementById('gaura').style.background=GODS.shiva.aura;
}
window.addEventListener('load',()=>{speechSynthesis?.getVoices();});
</script>
