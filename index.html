<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Divine AI - Hologram Gods</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Three.js for 3D universe -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="universe-container"></div>
  
  <!-- Hologram God Display -->
  <div id="god-stage">
    <div id="hologram-god" class="hidden">
      <img id="god-image" src="" alt="God" />
      <div id="eye-contact-overlay"></div>
      <div id="reaction-bubble" class="hidden"></div>
    </div>
  </div>

  <!-- Control Panel -->
  <div id="control-panel">
    <div id="music-controls">
      <button id="toggle-music">🎵 Music: ON</button>
      <select id="music-select">
        <option value="shiva-flute">Shiva Flute</option>
        <option value="vishnu-conch">Vishnu Conch</option>
        <option value="durga-drum">Durga Damru</option>
        <option value="cosmic-ambient">Cosmic Ambient</option>
      </select>
    </div>

    <!-- Voice & Typing Input -->
    <div id="input-area">
      <textarea id="user-query" placeholder="Apna prashn poochiye..."></textarea>
      <div class="input-buttons">
        <button id="voice-btn">🎤 Bolna Shuru</button>
        <button id="send-btn">➤ Bhejiye</button>
      </div>
      <div id="voice-status" class="hidden">Sun raha hoon...</div>
    </div>

    <!-- Response Display -->
    <div id="response-area" class="hidden">
      <div id="god-response"></div>
      <button id="speak-response">🔊 Suniye</button>
    </div>
  </div>

  <!-- Hidden audio elements -->
  <audio id="bg-music" loop></audio>

  <script src="script.js"></script>
</body>
</html>
