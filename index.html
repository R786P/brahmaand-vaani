<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ब्रह्माण्ड वाणी — Divine Oracle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap');

:root {
  --gold: #f0c040;
  --deep-gold: #c8860a;
  --cosmic: #0a0620;
  --divine-white: #fff8e7;
  --glow-purple: rgba(120,0,255,0.6);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000;
  color: var(--divine-white);
  font-family:'Crimson Pro', serif;
  overflow:hidden;
  height:100vh; width:100vw;
}

/* ===== COSMOS ===== */
canvas#stars { position:fixed; inset:0; width:100%; height:100%; z-index:0; }

.nebula {
  position:fixed; border-radius:50%;
  filter:blur(90px); z-index:1;
  animation:ndrift 20s ease-in-out infinite alternate;
}
.n1{width:700px;height:500px;background:radial-gradient(ellipse,rgba(80,0,160,0.45) 0%,transparent 70%);top:-15%;left:-15%;animation-duration:25s;}
.n2{width:600px;height:600px;background:radial-gradient(ellipse,rgba(0,30,120,0.5) 0%,transparent 70%);bottom:-15%;right:-15%;animation-duration:32s;animation-delay:-12s;}
.n3{width:350px;height:350px;background:radial-gradient(ellipse,rgba(160,0,60,0.35) 0%,transparent 70%);top:25%;right:15%;animation-duration:18s;animation-delay:-6s;}
.n4{width:250px;height:250px;background:radial-gradient(ellipse,rgba(0,100,80,0.25) 0%,transparent 70%);top:60%;left:10%;animation-duration:22s;animation-delay:-3s;}
@keyframes ndrift{0%{transform:translate(0,0) scale(1);}100%{transform:translate(40px,30px) scale(1.15);}}

.gring{position:fixed;top:50%;left:50%;border-radius:50%;border:1px solid rgba(200,150,255,0.08);transform:translate(-50%,-50%) rotateX(75deg);animation:grot 60s linear infinite;z-index:1;}
.gring:nth-child(1){width:900px;height:900px;}
.gring:nth-child(2){width:650px;height:650px;border-color:rgba(150,200,255,0.06);animation-duration:45s;}
.gring:nth-child(3){width:420px;height:420px;border-color:rgba(255,200,100,0.05);animation-duration:28s;}
@keyframes grot{from{transform:translate(-50%,-50%) rotateX(75deg) rotateZ(0deg);}to{transform:translate(-50%,-50%) rotateX(75deg) rotateZ(360deg);}}

/* ===== UI ===== */
#ui { position:relative; z-index:10; height:100vh; display:flex; flex-direction:column; align-items:center; }

/* Title */
#title {
  position:absolute; top:25px; left:50%; transform:translateX(-50%);
  text-align:center; animation:tglow 3s ease-in-out infinite alternate;
}
#title h1 {
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(1rem,2.5vw,2rem);
  color:var(--gold);
  text-shadow:0 0 30px rgba(240,192,64,0.9),0 0 60px rgba(240,192,64,0.4);
  letter-spacing:4px; white-space:nowrap;
}
#title p { font-size:0.75rem; color:rgba(255,248,231,0.4); letter-spacing:8px; margin-top:4px; font-style:italic; }
@keyframes tglow{from{filter:drop-shadow(0 0 8px rgba(240,192,64,0.3));}to{filter:drop-shadow(0 0 25px rgba(240,192,64,0.8));}}

/* API Keys Setup */
#setup-panel {
  position:fixed; top:20px; left:20px; z-index:100;
  background:rgba(5,2,20,0.92); border:1px solid rgba(240,192,64,0.25);
  border-radius:16px; padding:16px; width:260px;
  backdrop-filter:blur(20px);
  box-shadow:0 0 30px rgba(100,0,200,0.3);
}
#setup-panel h3 {
  font-family:'Cinzel Decorative',cursive;
  font-size:0.65rem; color:var(--gold); letter-spacing:3px;
  margin-bottom:12px; text-align:center;
}
.key-input-wrap { margin-bottom:10px; }
.key-input-wrap label { font-size:0.65rem; color:rgba(255,248,231,0.5); letter-spacing:2px; display:block; margin-bottom:4px; }
.key-input-wrap input {
  width:100%; background:rgba(255,255,255,0.05);
  border:1px solid rgba(240,192,64,0.2); border-radius:8px;
  padding:8px 10px; font-size:0.75rem; color:var(--divine-white);
  outline:none; font-family:'Crimson Pro',serif;
}
.key-input-wrap input:focus { border-color:var(--gold); }
.key-input-wrap input::placeholder { color:rgba(255,248,231,0.2); font-size:0.7rem; }
#save-keys {
  width:100%; padding:9px; background:linear-gradient(135deg,var(--deep-gold),var(--gold));
  border:none; border-radius:8px; color:#1a0a00; font-family:'Cinzel Decorative',cursive;
  font-size:0.65rem; letter-spacing:2px; cursor:pointer; transition:all 0.3s;
}
#save-keys:hover { box-shadow:0 0 20px rgba(240,192,64,0.6); transform:scale(1.02); }
#setup-note { font-size:0.6rem; color:rgba(255,248,231,0.3); text-align:center; margin-top:8px; line-height:1.5; }
#setup-note a { color:rgba(240,192,64,0.6); text-decoration:none; }

/* God Selector */
#god-selector {
  position:fixed; top:20px; right:20px; z-index:100;
  display:flex; flex-direction:column; gap:8px; align-items:center;
}
#god-selector label { font-size:0.6rem; letter-spacing:3px; color:var(--gold); text-transform:uppercase; }
.god-btn {
  width:54px; height:54px; border-radius:50%;
  border:2px solid rgba(240,192,64,0.25);
  background:rgba(0,0,0,0.5); cursor:pointer;
  font-size:1.5rem; transition:all 0.3s;
  backdrop-filter:blur(8px);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
}
.god-btn .glabel { font-size:0.38rem; color:var(--gold); letter-spacing:1px; font-family:'Cinzel Decorative',cursive; }
.god-btn:hover,.god-btn.active {
  border-color:var(--gold);
  box-shadow:0 0 20px rgba(240,192,64,0.7),inset 0 0 20px rgba(240,192,64,0.1);
  transform:scale(1.1);
}

/* ===== GOD CHARACTER ===== */
#god-wrap {
  position:fixed; bottom:155px; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center;
  opacity:0; transition:opacity 0.8s ease; pointer-events:none; z-index:20;
}
#god-wrap.visible { opacity:1; }

#god-aura {
  position:absolute; width:240px; height:240px; border-radius:50%;
  background:radial-gradient(circle,rgba(255,200,50,0.3) 0%,transparent 70%);
  animation:apulse 2s ease-in-out infinite; top:-30px;
}
@keyframes apulse{0%,100%{transform:scale(1);opacity:0.6;}50%{transform:scale(1.25);opacity:1;}}

#god-emoji {
  position:relative; z-index:5;
  font-size:8rem; line-height:1;
  filter:drop-shadow(0 0 30px rgba(255,200,50,0.8));
  animation:gfloat 4s ease-in-out infinite;
  transition:filter 0.3s;
  display:flex; align-items:center; justify-content:center;
  width:160px; height:160px;
}
@keyframes gfloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}

#eyes-layer {
  position:absolute; top:40%; left:50%; transform:translateX(-50%);
  width:90px; height:28px;
  display:flex; justify-content:space-between;
  pointer-events:none; z-index:10;
}
.eye {
  width:26px; height:26px; border-radius:50%;
  background:radial-gradient(circle,#fffbe0 30%,rgba(255,210,60,0.9) 70%);
  box-shadow:0 0 14px rgba(255,220,80,1),0 0 28px rgba(255,180,0,0.8);
  animation:eblink 5s ease-in-out infinite;
  transition:transform 0.15s ease;
}
@keyframes eblink{0%,94%,100%{transform:scaleY(1);}96%{transform:scaleY(0.05);}}

#god-name-tag {
  font-family:'Cinzel Decorative',cursive; color:var(--gold);
  font-size:0.9rem; letter-spacing:4px; margin-top:10px;
  text-shadow:0 0 20px rgba(240,192,64,0.9);
}

/* Speaking/Listening states */
#god-emoji.speaking { animation:gspeak 0.35s ease-in-out infinite alternate; }
@keyframes gspeak{from{filter:drop-shadow(0 0 20px rgba(255,200,50,0.5)) drop-shadow(0 0 0px #fff);}to{filter:drop-shadow(0 0 55px rgba(255,230,80,1)) drop-shadow(0 0 20px rgba(255,200,50,0.5));}}
#god-emoji.listening { animation:glisten 0.6s ease-in-out infinite alternate; }
@keyframes glisten{from{filter:drop-shadow(0 0 20px rgba(80,200,255,0.8));transform:translateY(-8px) rotate(-4deg);}to{filter:drop-shadow(0 0 50px rgba(80,200,255,1));transform:translateY(-14px) rotate(4deg);}}

/* Answer bubble */
#answer-bubble {
  position:fixed; bottom:355px; left:50%; transform:translateX(-50%) translateY(10px);
  max-width:480px; width:88vw;
  background:linear-gradient(135deg,rgba(15,4,40,0.93) 0%,rgba(40,8,85,0.9) 100%);
  border:1px solid rgba(240,192,64,0.3);
  border-radius:20px; padding:18px 22px;
  text-align:center; font-size:1rem; line-height:1.75;
  opacity:0; pointer-events:none; z-index:15;
  transition:opacity 0.5s, transform 0.5s;
  backdrop-filter:blur(24px);
  box-shadow:0 0 50px rgba(100,0,200,0.3);
}
#answer-bubble.visible { opacity:1; transform:translateX(-50%) translateY(0); }
#answer-bubble::after {
  content:''; position:absolute; bottom:-12px; left:50%; transform:translateX(-50%);
  border-left:11px solid transparent; border-right:11px solid transparent;
  border-top:11px solid rgba(240,192,64,0.25);
}
#answer-text { display:block; }
#answer-text.typing::after { content:'|'; animation:cblink 0.6s infinite; color:var(--gold); }
@keyframes cblink{0%,100%{opacity:1;}50%{opacity:0;}}

/* Sound rings */
#srings { position:fixed; bottom:235px; left:50%; transform:translateX(-50%); pointer-events:none; z-index:5; }
.sring {
  position:absolute; width:120px; height:120px; border-radius:50%;
  border:2px solid rgba(240,192,64,0.4);
  top:50%; left:50%; transform:translate(-50%,-50%) scale(0); opacity:0;
}
.sring.go { animation:rexp 2.2s ease-out forwards; }
.sring:nth-child(2){animation-delay:0.35s;}
.sring:nth-child(3){animation-delay:0.7s;}
@keyframes rexp{0%{transform:translate(-50%,-50%) scale(0);opacity:0.9;}100%{transform:translate(-50%,-50%) scale(4);opacity:0;}}

/* ===== STATUS ===== */
#status {
  position:fixed; bottom:108px; left:50%; transform:translateX(-50%);
  font-size:0.72rem; letter-spacing:3px; color:rgba(255,248,231,0.35);
  text-transform:uppercase; white-space:nowrap; z-index:20;
  transition:all 0.3s;
}

/* ===== INPUT AREA ===== */
#input-area {
  position:fixed; bottom:38px; left:50%; transform:translateX(-50%);
  display:flex; gap:12px; align-items:center;
  width:min(620px,92vw); z-index:30;
}

#q-input {
  flex:1; background:rgba(8,4,28,0.88);
  border:1px solid rgba(240,192,64,0.3); border-radius:50px;
  padding:15px 22px; font-size:1rem; font-family:'Crimson Pro',serif;
  color:var(--divine-white); outline:none;
  backdrop-filter:blur(20px); transition:all 0.3s;
  box-shadow:0 0 20px rgba(100,0,200,0.15);
}
#q-input:focus { border-color:var(--gold); box-shadow:0 0 30px rgba(240,192,64,0.25),0 0 60px rgba(100,0,200,0.15); }
#q-input::placeholder { color:rgba(255,248,231,0.25); }

.abtn {
  width:52px; height:52px; border-radius:50%;
  border:none; cursor:pointer; font-size:1.2rem;
  transition:all 0.3s; display:flex; align-items:center;
  justify-content:center; flex-shrink:0; position:relative;
}
#mic-btn {
  background:linear-gradient(135deg,#150930,#3a1270);
  border:1.5px solid rgba(240,192,64,0.3);
  box-shadow:0 0 20px rgba(100,0,200,0.35);
}
#mic-btn:hover { transform:scale(1.1); box-shadow:0 0 35px rgba(100,0,200,0.65); }
#mic-btn.active-listen {
  background:linear-gradient(135deg,#001835,#004870);
  border-color:rgba(100,200,255,0.8);
  box-shadow:0 0 35px rgba(0,160,255,0.7);
  animation:mpulse 0.5s ease-in-out infinite alternate;
}
@keyframes mpulse{from{transform:scale(1);}to{transform:scale(1.18);}}

/* Mic waveform animation */
.mic-waves {
  position:absolute; width:100%; height:100%;
  border-radius:50%; display:none;
}
#mic-btn.active-listen .mic-waves { display:block; }
.mic-waves::before,.mic-waves::after {
  content:''; position:absolute; inset:-4px; border-radius:50%;
  border:2px solid rgba(100,200,255,0.4);
  animation:mwave 1.2s ease-out infinite;
}
.mic-waves::after { inset:-10px; animation-delay:0.5s; }
@keyframes mwave{0%{transform:scale(1);opacity:0.8;}100%{transform:scale(1.5);opacity:0;}}

#send-btn {
  background:linear-gradient(135deg,var(--deep-gold),var(--gold));
  color:#1a0800;
  box-shadow:0 0 25px rgba(240,192,64,0.4);
}
#send-btn:hover { transform:scale(1.1); box-shadow:0 0 40px rgba(240,192,64,0.8); }
#send-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

/* Particles */
.ptcl {
  position:fixed; border-radius:50%;
  pointer-events:none; z-index:50;
  animation:pfly 1.6s ease-out forwards;
}
@keyframes pfly{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0);}}

/* ===== INTRO ===== */
#intro {
  position:fixed; inset:0; background:#000; z-index:1000;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
  transition:opacity 1.5s;
}
#intro-logo { font-size:4rem; animation:ilogo 2s ease infinite alternate; }
@keyframes ilogo{from{filter:drop-shadow(0 0 20px rgba(240,192,64,0.5));}to{filter:drop-shadow(0 0 60px rgba(240,192,64,1));}}
#intro h1 {
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(1.4rem,4vw,3rem); color:var(--gold);
  text-shadow:0 0 60px rgba(240,192,64,0.8);
  text-align:center; opacity:0; animation:ifade 2s ease 0.5s forwards;
}
#intro p { color:rgba(255,248,231,0.5); letter-spacing:6px; font-size:0.85rem; opacity:0; animation:ifade 2s ease 1.5s forwards; }
#enter-btn {
  margin-top:20px; padding:14px 45px;
  background:transparent; border:1.5px solid var(--gold);
  color:var(--gold); font-family:'Cinzel Decorative',cursive;
  font-size:0.9rem; letter-spacing:4px; cursor:pointer;
  border-radius:50px; transition:all 0.4s;
  opacity:0; animation:ifade 2s ease 2.5s forwards;
}
#enter-btn:hover { background:rgba(240,192,64,0.15); box-shadow:0 0 40px rgba(240,192,64,0.5); transform:scale(1.05); }
@keyframes ifade{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* Loading indicator */
#loading {
  position:fixed; bottom:120px; left:50%; transform:translateX(-50%);
  display:none; gap:6px; z-index:25;
}
#loading.show { display:flex; }
.ldot {
  width:8px; height:8px; border-radius:50%;
  background:var(--gold); opacity:0.3;
  animation:ldot 1.2s ease-in-out infinite;
}
.ldot:nth-child(2){animation-delay:0.2s;}
.ldot:nth-child(3){animation-delay:0.4s;}
@keyframes ldot{0%,100%{opacity:0.2;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}

/* Error toast */
#toast {
  position:fixed; top:80px; left:50%; transform:translateX(-50%);
  background:rgba(180,0,0,0.9); color:#fff;
  padding:10px 22px; border-radius:50px; font-size:0.8rem;
  z-index:200; opacity:0; transition:opacity 0.3s;
  backdrop-filter:blur(10px); white-space:nowrap;
}
#toast.show { opacity:1; }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div id="intro-logo">🕉️</div>
  <h1>ब्रह्माण्ड वाणी</h1>
  <p>DIVINE ORACLE · COSMIC CONSCIOUSNESS</p>
  <button id="enter-btn" onclick="enterCosmos()">प्रवेश करें ✨</button>
</div>

<!-- COSMOS BG -->
<canvas id="stars"></canvas>
<div class="nebula n1"></div>
<div class="nebula n2"></div>
<div class="nebula n3"></div>
<div class="nebula n4"></div>
<div class="gring"></div>
<div class="gring"></div>
<div class="gring"></div>

<!-- MAIN UI -->
<div id="ui">

  <!-- Title -->
  <div id="title">
    <h1>🕉️ ब्रह्माण्ड वाणी</h1>
    <p>DIVINE ORACLE</p>
  </div>

  <!-- API Setup -->
  <div id="setup-panel">
    <h3>⚙️ API KEYS</h3>
    <div class="key-input-wrap">
      <label>ANTHROPIC API KEY</label>
      <input type="password" id="anthropic-key" placeholder="sk-ant-..." />

    <div class="key-input-wrap">
      <label>ELEVENLABS API KEY</label>
      <input type="password" id="eleven-key" placeholder="sk_..." />
    </div>
    <button id="save-keys" onclick="saveKeys()">🔑 ACTIVATE</button>
    <p id="setup-note">
      Free keys: <a href="https://console.anthropic.com" target="_blank">Anthropic</a> &amp; 
      <a href="https://elevenlabs.io" target="_blank">ElevenLabs</a><br/>
      Keys sirf aapke browser mein save hoti hain
    </p>
  </div>

  <!-- God Selector -->
  <div id="god-selector">
    <label>देव चुनें</label>
    <button class="god-btn active" onclick="changeGod('shiva')" id="btn-shiva">🔱<span class="glabel">SHIVA</span></button>
    <button class="god-btn" onclick="changeGod('krishna')" id="btn-krishna">🦚<span class="glabel">KRISHNA</span></button>
    <button class="god-btn" onclick="changeGod('ganesh')" id="btn-ganesh">🐘<span class="glabel">GANESH</span></button>
    <button class="god-btn" onclick="changeGod('durga')" id="btn-durga">⚔️<span class="glabel">DURGA</span></button>
    <button class="god-btn" onclick="changeGod('vishnu')" id="btn-vishnu">🌊<span class="glabel">VISHNU</span></button>
    <button class="god-btn" onclick="changeGod('brahma')" id="btn-brahma">✨<span class="glabel">BRAHMA</span></button>

  <!-- Sound Rings -->
  <div id="srings">

  <!-- God Character -->
  <div id="god-wrap">

      <div id="eyes-layer">

  <!-- Loading dots -->

    <div class="ldot"></div>
    <div class="ldot"></div>

  </div>

  <!-- Status -->
  <div id="status">प्रश्न पूछें — ब्रह्मांड सुन रहा है 🙏</div>

  <!-- Input Area -->

      🎤
      <div class="mic-waves"></div>
    </button>
    <input id="q-input" type="text" placeholder="अपना प्रश्न यहाँ लिखें या 🎤 दबाएं..." onkeydown="if(event.key==='Enter')askGod()" />
    <button class="abtn" id="send-btn" onclick="askGod()">⚡</button>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ===== STAR CANVAS =====
const cvs = document.getElementById('stars');
const cx = cvs.getContext('2d');
let stars=[], shoots=[];

function resize(){
  cvs.width=innerWidth; cvs.height=innerHeight;
  stars=[];
  for(let i=0;i<400;i++){
    stars.push({
      x:Math.random()*cvs.width, y:Math.random()*cvs.height,
      r:Math.random()*1.8+0.2, phase:Math.random()*Math.PI*2,
      speed:Math.random()*0.3+0.05,
      h:190+Math.random()*80, s:60+Math.random()*30, l:70+Math.random()*25
    });
  }
}
window.addEventListener('resize',resize); resize();

let t=0;
function drawStars(){
  cx.clearRect(0,0,cvs.width,cvs.height);
  t+=0.008;
  stars.forEach(s=>{
    const op=0.25+0.7*Math.abs(Math.sin(t*s.speed+s.phase));
    cx.beginPath();
    cx.arc(s.x,s.y,s.r,0,Math.PI*2);
    cx.fillStyle=`hsla(${s.h},${s.s}%,${s.l}%,${op})`;
    cx.fill();
  });
  shoots=shoots.filter(s=>s.op>0.01);
  shoots.forEach(s=>{
    cx.beginPath();
    const g=cx.createLinearGradient(s.x,s.y,s.x-Math.cos(s.a)*s.len,s.y-Math.sin(s.a)*s.len);
    g.addColorStop(0,`rgba(255,248,200,${s.op})`);
    g.addColorStop(1,'transparent');
    cx.moveTo(s.x,s.y);
    cx.lineTo(s.x-Math.cos(s.a)*s.len,s.y-Math.sin(s.a)*s.len);
    cx.strokeStyle=g; cx.lineWidth=2; cx.stroke();
    s.x+=Math.cos(s.a)*s.spd; s.y+=Math.sin(s.a)*s.spd; s.op-=0.013;
  });
  requestAnimationFrame(drawStars);
}

let aud=null;
function startMusic(){
  try{
    aud=new(window.AudioContext||window.webkitAudioContext)();
    [[55,0],[82,0.02],[110,0],[165,0.015],[220,0],[330,0.01]].forEach(([f,det],i)=>{
      const o=aud.createOscillator(),g=aud.createGain(),flt=aud.createBiquadFilter();
      o.type=i<2?'sine':i<4?'triangle':'sine';
      o.frequency.value=f+det*f;
      o.frequency.linearRampToValueAtTime(f*(1+det*2),aud.currentTime+8);
      o.frequency.linearRampToValueAtTime(f,aud.currentTime+16);
      g.gain.setValueAtTime(0,aud.currentTime);
      g.gain.linearRampToValueAtTime(0.055/(i*0.5+1),aud.currentTime+4);
      flt.type='lowpass'; flt.frequency.value=500;
      o.connect(flt); flt.connect(g); g.connect(aud.destination); o.start();
    });
    // Bell tones
    function bell(){
      if(!aud)return;
      const f=[396,528,639,741,852][Math.floor(Math.random()*5)];
      const o=aud.createOscillator(),g=aud.createGain(),o2=aud.createOscillator(),g2=aud.createGain();
      o.type='sine'; o.frequency.value=f; o2.type='sine'; o2.frequency.value=f*1.5;
      g.gain.setValueAtTime(0.18,aud.currentTime); g.gain.exponentialRampToValueAtTime(0.001,aud.currentTime+5);
      g2.gain.setValueAtTime(0.06,aud.currentTime); g2.gain.exponentialRampToValueAtTime(0.001,aud.currentTime+3);
      o.connect(g);g.connect(aud.destination);o.start();o.stop(aud.currentTime+5);
      o2.connect(g2);g2.connect(aud.destination);o2.start();o2.stop(aud.currentTime+3);
      setTimeout(bell,5000+Math.random()*7000);
    }
    setTimeout(bell,3000);
  }catch(e){}
}

let currentGod='shiva', isBusy=false, isListening=false, recog=null;
let ANTHROPIC_KEY='', ELEVEN_KEY='';

// Load saved keys
function loadKeys(){
  ANTHROPIC_KEY=localStorage.getItem('antKey')||'';
  ELEVEN_KEY=localStorage.getItem('elvKey')||'';
  if(ANTHROPIC_KEY) document.getElementById('anthropic-key').value=ANTHROPIC_KEY;
  if(ELEVEN_KEY) document.getElementById('eleven-key').value=ELEVEN_KEY;
}

function saveKeys(){
  ANTHROPIC_KEY=document.getElementById('anthropic-key').value.trim();
  ELEVEN_KEY=document.getElementById('eleven-key').value.trim();
  if(!ANTHROPIC_KEY){showToast('Anthropic API key daalo!');return;}
  localStorage.setItem('antKey',ANTHROPIC_KEY);
  localStorage.setItem('elvKey',ELEVEN_KEY);

// ===== CHANGE GOD =====
function changeGod(g){

  const emojiEl=document.getElementById('god-emoji');
  emojiEl.childNodes[0].nodeValue=god.emoji+' ';

    `radial-gradient(circle,${god.color}55 0%,transparent 70%)`;

function showGod(withBubble){
  document.getElementById('god-wrap').classList.add('visible');
  if(!withBubble){
    document.getElementById('answer-bubble').classList.remove('visible');
    document.getElementById('answer-text').textContent='';
  }
}
function hideGod(){
  if(isBusy)return;
  document.getElementById('god-wrap').classList.remove('visible');
  document.getElementById('answer-bubble').classList.remove('visible');
}

// ===== EYE TRACKING =====
document.addEventListener('mousemove',e=>{
  const wrap=document.getElementById('god-wrap');
  if(!wrap.classList.contains('visible'))return;
  const rect=document.getElementById('god-emoji').getBoundingClientRect();
  const cx2=rect.left+rect.width/2, cy2=rect.top+rect.height/2;
  const dx=(e.clientX-cx2)/innerWidth, dy=(e.clientY-cy2)/innerHeight;
  const m=6;
  [document.getElementById('leye'),document.getElementById('reye')].forEach(eye=>{
    eye.style.transform=`translate(${Math.max(-m,Math.min(m,dx*18))}px,${Math.max(-m,Math.min(m,dy*18))}px)`;
  });
});

// ===== MIC =====
function toggleMic(){
  if(isBusy)return;
  if(isListening){recog?.stop();return;}

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showToast('Aapka browser voice input support nahi karta 😢');return;}

  recog=new SR();
  recog.lang='hi-IN'; recog.continuous=false; recog.interimResults=true;

  recog.onstart=()=>{
    isListening=true;
    document.getElementById('mic-btn').classList.add('active-listen');
    document.getElementById('god-emoji').classList.add('listening');
    showGod(false);
    setStatus('🎤 बोलिए... देव सुन रहे हैं');
  };

  recog.onresult=e=>{
    const txt=Array.from(e.results).map(r=>r[0].transcript).join('');
    document.getElementById('q-input').value=txt;
  };

  recog.onerror=()=>{
    endListen();
    showToast('Awaaz sunne mein dikkat hui, dobara try karein');
  };

  recog.onend=()=>{
    endListen();
    const v=document.getElementById('q-input').value.trim();
    if(v) askGod();
    else{setStatus('Kuch suna nahi... dobara poochein 🙏');hideGod();}
  };

  recog.start();
}

function endListen(){
  isListening=false;
  document.getElementById('mic-btn').classList.remove('active-listen');
  document.getElementById('god-emoji').classList.remove('listening');
}

// ===== ASK GOD =====
async function askGod(){
  if(isBusy)return;
  const inp=document.getElementById('q-input');
  const q=inp.value.trim();
  if(!q){showToast('Pehle prashn likho ya bolo 🙏');return;}
  if(!ANTHROPIC_KEY){showToast('Pehle API key save karo! ⚙️');return;}

  inp.value=''; isBusy=true;
  document.getElementById('send-btn').disabled=true;
  showGod(true); spawnParticles();
  setStatus('देव ध्यान कर रहे हैं... ✨');
  showLoading(true);

  const god=GODS[currentGod];

  try{
    // Get AI answer
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:god.system,
        messages:[{role:'user',content:q}]
      })
    });
    const data=await res.json();
    if(data.error){throw new Error(data.error.message);}
    const answer=data.content?.[0]?.text||'हे पुत्र, यह प्रश्न ब्रह्माण्ड में गूंज रहा है... शीघ्र उत्तर आएगा।';

    showLoading(false);
    await typeText(answer);
    triggerRings();
    setStatus('देव वाणी बोल रहे हैं ✨');
    document.getElementById('god-emoji').classList.add('speaking');

    await speakText(answer, god.voiceId);

  }catch(err){
    showLoading(false);
    console.error(err);
    const fallback='हे वत्स, इस क्षण ब्रह्माण्ड की शक्तियाँ अवरुद्ध हैं। API key जाँचें या पुनः प्रयास करें। 🙏';
    await typeText(fallback);
    document.getElementById('god-emoji').classList.add('speaking');
    await speakFallback(fallback);
  }

  document.getElementById('god-emoji').classList.remove('speaking');
  isBusy=false;
  document.getElementById('send-btn').disabled=false;
  setStatus('प्रश्न पूछें — ब्रह्मांड सुन रहा है 🙏');
  setTimeout(hideGod,6000);
}

// ===== TYPE TEXT =====
function typeText(txt){
  return new Promise(res=>{
    const el=document.getElementById('answer-text');
    const bub=document.getElementById('answer-bubble');
    el.textContent=''; el.className='typing';
    bub.classList.add('visible');
    let i=0;
    const iv=setInterval(()=>{
      if(i<txt.length){el.textContent+=txt[i];i++;}
      else{clearInterval(iv);el.className='';res();}
    },28);
  });
}

// ===== ELEVENLABS SPEAK =====
async function speakText(txt, voiceId){
  return new Promise(async res=>{
    if(!ELEVEN_KEY){await speakFallback(txt);res();return;}
    try{
      const r=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`,{
        method:'POST',
        headers:{'xi-api-key':ELEVEN_KEY,'Content-Type':'application/json'},
        body:JSON.stringify({
          text:txt,
          model_id:'eleven_multilingual_v2',
          voice_settings:{
            stability:0.45,
            similarity_boost:0.80,
            style:0.35,
            use_speaker_boost:true
          }
        })
      });
      if(!r.ok) throw new Error('ElevenLabs error');
      const blob=await r.blob();
      const url=URL.createObjectURL(blob);
      const audio=new Audio(url);
      audio.onended=()=>{URL.revokeObjectURL(url);res();};
      audio.onerror=()=>{res();};
      audio.play();
    }catch(e){
      await speakFallback(txt); res();
    }
  });
}

// Fallback browser TTS
function speakFallback(txt){
  return new Promise(res=>{
    if(!('speechSynthesis' in window)){setTimeout(res,2000);return;}
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(txt);
    const voices=speechSynthesis.getVoices();
    const v=voices.find(x=>x.lang.startsWith('hi'))||voices.find(x=>x.lang.startsWith('en-IN'))||voices[0];
    if(v)u.voice=v;
    u.rate=0.82; u.pitch=0.75; u.lang='hi-IN';
    u.onend=u.onerror=()=>res();
    speechSynthesis.speak(u);
  });
}

// ===== HELPERS =====
function showLoading(on){
  document.getElementById('loading').classList.toggle('show',on);
}
function setStatus(msg){
  document.getElementById('status').textContent=msg;
}
function triggerRings(){
  document.querySelectorAll('.sring').forEach(r=>{
    r.classList.remove('go'); void r.offsetWidth; r.classList.add('go');
  });
}
function spawnParticles(){
  for(let i=0;i<24;i++){
    const p=document.createElement('div');
    p.className='ptcl';
    const sz=Math.random()*9+3, h=25+Math.random()*40;
    p.style.cssText=`width:${sz}px;height:${sz}px;background:hsl(${h},100%,65%);
      box-shadow:0 0 8px hsl(${h},100%,55%);
      left:50%;top:60%;
      --tx:${(Math.random()-0.5)*350}px;
      --ty:${(Math.random()-0.8)*300}px;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1700);
  }
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
