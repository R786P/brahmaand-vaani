<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divine Oracle — ब्रह्माण्ड वाणी</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap');

  :root {
    --gold: #f0c040;
    --deep-gold: #c8860a;
    --cosmic-blue: #0a0620;
    --nebula-purple: #2d0a5e;
    --divine-white: #fff8e7;
    --glow-orange: #ff6b00;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: var(--divine-white);
    font-family: 'Crimson Pro', serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: crosshair;
  }

  /* ===== COSMOS CANVAS ===== */
  #cosmos {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  canvas#stars {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* Nebula layers */
  .nebula {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    animation: nebula-drift 20s ease-in-out infinite alternate;
  }
  .nebula-1 { width: 600px; height: 400px; background: radial-gradient(ellipse, rgba(80,0,160,0.4) 0%, transparent 70%); top: -10%; left: -10%; animation-duration: 25s; }
  .nebula-2 { width: 500px; height: 500px; background: radial-gradient(ellipse, rgba(0,40,120,0.5) 0%, transparent 70%); bottom: -10%; right: -10%; animation-duration: 30s; animation-delay: -10s; }
  .nebula-3 { width: 300px; height: 300px; background: radial-gradient(ellipse, rgba(180,0,60,0.3) 0%, transparent 70%); top: 30%; right: 20%; animation-duration: 18s; animation-delay: -5s; }

  @keyframes nebula-drift {
    0% { transform: translate(0,0) scale(1); }
    100% { transform: translate(40px, 30px) scale(1.15); }
  }

  /* Galaxy spiral */
  .galaxy-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    border-radius: 50%;
    border: 1px solid rgba(200,150,255,0.1);
    transform: translate(-50%,-50%) rotateX(75deg);
    animation: galaxy-rotate 60s linear infinite;
  }
  .galaxy-ring:nth-child(1) { width: 800px; height: 800px; }
  .galaxy-ring:nth-child(2) { width: 600px; height: 600px; border-color: rgba(150,200,255,0.08); animation-duration: 45s; }
  .galaxy-ring:nth-child(3) { width: 400px; height: 400px; border-color: rgba(255,200,100,0.06); animation-duration: 30s; }

  @keyframes galaxy-rotate { from { transform: translate(-50%,-50%) rotateX(75deg) rotateZ(0deg); } to { transform: translate(-50%,-50%) rotateX(75deg) rotateZ(360deg); } }

  /* ===== UI OVERLAY ===== */
  #ui {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 40px;
  }

  /* Title */
  #title-area {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    animation: title-glow 3s ease-in-out infinite alternate;
  }
  #title-area h1 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(1.2rem, 3vw, 2.2rem);
    color: var(--gold);
    text-shadow: 0 0 30px rgba(240,192,64,0.8), 0 0 60px rgba(240,192,64,0.4);
    letter-spacing: 4px;
  }
  #title-area p {
    font-size: 0.9rem;
    color: rgba(255,248,231,0.5);
    letter-spacing: 8px;
    margin-top: 6px;
    font-style: italic;
  }
  @keyframes title-glow {
    from { filter: drop-shadow(0 0 10px rgba(240,192,64,0.3)); }
    to { filter: drop-shadow(0 0 25px rgba(240,192,64,0.7)); }
  }

  /* ===== GOD SELECTOR ===== */
  #god-selector {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 20;
  }
  #god-selector label {
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    text-align: center;
  }
  .god-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid rgba(240,192,64,0.3);
    background: rgba(0,0,0,0.5);
    cursor: pointer;
    font-size: 1.6rem;
    transition: all 0.3s;
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0;
  }
  .god-btn span.label { font-size: 0.4rem; color: var(--gold); letter-spacing: 1px; }
  .god-btn:hover, .god-btn.active {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(240,192,64,0.6), inset 0 0 20px rgba(240,192,64,0.1);
    transform: scale(1.1);
  }

  /* ===== GOD CHARACTER ===== */
  #god-container {
    position: absolute;
    bottom: 160px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
  }
  #god-container.visible { opacity: 1; }

  #god-aura {
    position: absolute;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,200,50,0.25) 0%, transparent 70%);
    animation: aura-pulse 2s ease-in-out infinite;
    top: -20px;
  }
  @keyframes aura-pulse {
    0%,100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.2); opacity: 1; }
  }

  #god-face {
    position: relative;
    z-index: 5;
    width: 180px;
    height: 180px;
    font-size: 9rem;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 0 30px rgba(255,200,50,0.8));
    animation: god-float 4s ease-in-out infinite;
    cursor: default;
    transition: transform 0.3s;
  }
  @keyframes god-float {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
  }

  /* God eyes - overlaid for blinking and looking */
  #god-eyes-overlay {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 24px;
    display: flex;
    justify-content: space-between;
    z-index: 10;
    pointer-events: none;
  }
  .eye-glow {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff8e7 30%, rgba(255,200,50,0.8) 70%);
    box-shadow: 0 0 15px rgba(255,220,80,1), 0 0 30px rgba(255,180,0,0.8);
    animation: eye-blink 5s ease-in-out infinite;
    transition: transform 0.3s ease;
  }
  @keyframes eye-blink {
    0%,95%,100% { transform: scaleY(1); }
    97% { transform: scaleY(0.05); }
  }

  /* Speaking animation */
  #god-face.speaking { animation: god-speak 0.3s ease-in-out infinite alternate; }
  @keyframes god-speak {
    from { filter: drop-shadow(0 0 20px rgba(255,200,50,0.6)); transform: translateY(-15px) scale(1.02); }
    to { filter: drop-shadow(0 0 50px rgba(255,220,80,1)); transform: translateY(-15px) scale(1.05); }
  }

  /* Listening animation */
  #god-face.listening {
    animation: god-listen 0.5s ease-in-out infinite alternate;
  }
  @keyframes god-listen {
    from { filter: drop-shadow(0 0 20px rgba(100,200,255,0.8)); transform: translateY(-10px) rotate(-3deg); }
    to { filter: drop-shadow(0 0 40px rgba(100,200,255,1)); transform: translateY(-15px) rotate(3deg); }
  }

  #god-name {
    font-family: 'Cinzel Decorative', cursive;
    color: var(--gold);
    font-size: 1rem;
    letter-spacing: 4px;
    margin-top: 10px;
    text-shadow: 0 0 20px rgba(240,192,64,0.8);
  }

  /* Answer bubble */
  #answer-bubble {
    position: absolute;
    bottom: 370px;
    left: 50%;
    transform: translateX(-50%);
    max-width: 500px;
    width: 90vw;
    background: linear-gradient(135deg, rgba(20,5,50,0.9) 0%, rgba(45,10,94,0.85) 100%);
    border: 1px solid rgba(240,192,64,0.3);
    border-radius: 20px;
    padding: 20px 24px;
    text-align: center;
    font-size: 1.05rem;
    line-height: 1.7;
    opacity: 0;
    transition: opacity 0.5s, transform 0.5s;
    transform: translateX(-50%) translateY(10px);
    backdrop-filter: blur(20px);
    box-shadow: 0 0 40px rgba(100,0,200,0.3);
    pointer-events: none;
    z-index: 15;
  }
  #answer-bubble.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0px);
  }
  #answer-bubble::after {
    content: '';
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-top: 12px solid rgba(240,192,64,0.3);
  }

  /* Typing cursor */
  #answer-text::after {
    content: '|';
    animation: cursor-blink 0.7s infinite;
    color: var(--gold);
  }
  @keyframes cursor-blink { 0%,100%{opacity:1} 50%{opacity:0} }
  #answer-text.done::after { display: none; }

  /* ===== INPUT AREA ===== */
  #input-area {
    display: flex;
    gap: 12px;
    align-items: center;
    width: min(600px, 92vw);
    position: relative;
    z-index: 20;
  }

  #question-input {
    flex: 1;
    background: rgba(10,6,32,0.85);
    border: 1px solid rgba(240,192,64,0.4);
    border-radius: 50px;
    padding: 16px 24px;
    font-size: 1rem;
    font-family: 'Crimson Pro', serif;
    color: var(--divine-white);
    outline: none;
    backdrop-filter: blur(20px);
    transition: all 0.3s;
    box-shadow: 0 0 20px rgba(100,0,200,0.2);
  }
  #question-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 30px rgba(240,192,64,0.3), 0 0 60px rgba(100,0,200,0.2);
  }
  #question-input::placeholder { color: rgba(255,248,231,0.3); }

  .action-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 1.3rem;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #mic-btn {
    background: linear-gradient(135deg, #1a0a40, #3d1580);
    border: 1px solid rgba(240,192,64,0.4);
    color: var(--gold);
    box-shadow: 0 0 20px rgba(100,0,200,0.4);
  }
  #mic-btn:hover { transform: scale(1.1); box-shadow: 0 0 30px rgba(100,0,200,0.7); }
  #mic-btn.listening-active {
    background: linear-gradient(135deg, #002240, #005080);
    border-color: #00aaff;
    box-shadow: 0 0 30px rgba(0,170,255,0.7);
    animation: mic-pulse 0.5s ease-in-out infinite alternate;
  }
  @keyframes mic-pulse { from { transform: scale(1); } to { transform: scale(1.15); } }

  #ask-btn {
    background: linear-gradient(135deg, var(--deep-gold), var(--gold));
    color: #1a0a00;
    box-shadow: 0 0 25px rgba(240,192,64,0.5);
  }
  #ask-btn:hover { transform: scale(1.1); box-shadow: 0 0 40px rgba(240,192,64,0.8); }

  /* Status */
  #status {
    position: absolute;
    bottom: 105px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    letter-spacing: 3px;
    color: rgba(255,248,231,0.4);
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* Particle burst on speak */
  .particle {
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    animation: particle-fly 1.5s ease-out forwards;
    z-index: 100;
  }
  @keyframes particle-fly {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }

  /* Sound wave rings on speak */
  #sound-rings {
    position: absolute;
    bottom: 220px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
  }
  .ring {
    position: absolute;
    width: 100px;
    height: 100px;
    border: 2px solid rgba(240,192,64,0.5);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%) scale(0);
    opacity: 0;
  }
  .ring.animate {
    animation: ring-expand 2s ease-out forwards;
  }
  .ring:nth-child(2) { animation-delay: 0.3s; }
  .ring:nth-child(3) { animation-delay: 0.6s; }
  @keyframes ring-expand {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 0.8; }
    100% { transform: translate(-50%,-50%) scale(4); opacity: 0; }
  }

  /* Intro overlay */
  #intro {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    transition: opacity 1.5s ease;
  }
  #intro h1 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(1.5rem, 5vw, 3.5rem);
    color: var(--gold);
    text-shadow: 0 0 60px rgba(240,192,64,0.8);
    text-align: center;
    animation: intro-appear 2s ease forwards;
    opacity: 0;
  }
  #intro p {
    color: rgba(255,248,231,0.6);
    letter-spacing: 6px;
    font-size: 0.9rem;
    text-align: center;
    animation: intro-appear 2s ease 1s forwards;
    opacity: 0;
  }
  #enter-btn {
    margin-top: 30px;
    padding: 14px 40px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Cinzel Decorative', cursive;
    font-size: 1rem;
    letter-spacing: 4px;
    cursor: pointer;
    border-radius: 50px;
    transition: all 0.4s;
    animation: intro-appear 2s ease 2s forwards;
    opacity: 0;
  }
  #enter-btn:hover {
    background: rgba(240,192,64,0.2);
    box-shadow: 0 0 40px rgba(240,192,64,0.5);
    transform: scale(1.05);
  }
  @keyframes intro-appear {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- INTRO SCREEN -->
<div id="intro">
  <h1>🕉️ ब्रह्माण्ड वाणी 🕉️</h1>
  <p>Divine Oracle — Cosmic Consciousness</p>
  <button id="enter-btn" onclick="enterCosmos()">प्रवेश करें ✨</button>
</div>

<!-- COSMOS BACKGROUND -->
<div id="cosmos">
  <canvas id="stars"></canvas>
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>
  <div class="galaxy-ring"></div>
  <div class="galaxy-ring"></div>
  <div class="galaxy-ring"></div>
</div>

<!-- MAIN UI -->
<div id="ui">
  <!-- Title -->
  <div id="title-area">
    <h1>🕉️ ब्रह्माण्ड वाणी</h1>
    <p>DIVINE ORACLE</p>
  </div>

  <!-- God Selector -->
  <div id="god-selector">
    <label>देव चुनें</label>
    <button class="god-btn active" onclick="changeGod('shiva')" id="btn-shiva">🔱<span class="label">SHIVA</span></button>
    <button class="god-btn" onclick="changeGod('krishna')" id="btn-krishna">🦚<span class="label">KRISHNA</span></button>
    <button class="god-btn" onclick="changeGod('ganesh')" id="btn-ganesh">🐘<span class="label">GANESH</span></button>
    <button class="god-btn" onclick="changeGod('durga')" id="btn-durga">⚔️<span class="label">DURGA</span></button>
    <button class="god-btn" onclick="changeGod('vishnu')" id="btn-vishnu">🌊<span class="label">VISHNU</span></button>
    <button class="god-btn" onclick="changeGod('brahma')" id="btn-brahma">✨<span class="label">BRAHMA</span></button>
  </div>

  <!-- Sound Rings -->
  <div id="sound-rings">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
  </div>

  <!-- God Character -->
  <div id="god-container">
    <div id="god-aura"></div>
    <div id="god-face">🔱
      <div id="god-eyes-overlay">
        <div class="eye-glow" id="left-eye"></div>
        <div class="eye-glow" id="right-eye"></div>
      </div>
    </div>
    <div id="god-name">भगवान शिव</div>
  </div>

  <!-- Answer Bubble -->
  <div id="answer-bubble">
    <span id="answer-text" class="done"></span>
  </div>

  <!-- Status -->
  <div id="status">प्रश्न पूछें — ब्रह्मांड सुन रहा है</div>

  <!-- Input -->
  <div id="input-area">
    <button class="action-btn" id="mic-btn" onclick="toggleMic()" title="Awaaz se poochein">🎤</button>
    <input type="text" id="question-input" placeholder="ब्रह्माण्ड से प्रश्न पूछें..." onkeydown="if(event.key==='Enter') askGod()" />
    <button class="action-btn" id="ask-btn" onclick="askGod()" title="Poochein">⚡</button>
  </div>
</div>

<script>
// ===== STAR CANVAS =====
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];
let shootingStars = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  initStars();
}

function initStars() {
  stars = [];
  for (let i = 0; i < 350; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2 + 0.2,
      opacity: Math.random(),
      speed: Math.random() * 0.3 + 0.05,
      phase: Math.random() * Math.PI * 2,
      color: `hsl(${200 + Math.random()*100}, 80%, 80%)`
    });
  }
}

function spawnShootingStar() {
  shootingStars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height * 0.5,
    len: Math.random() * 150 + 50,
    speed: Math.random() * 8 + 4,
    opacity: 1,
    angle: Math.PI / 4 + Math.random() * 0.3
  });
}

let t = 0;
function animateStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  t += 0.01;

  // Stars
  stars.forEach(s => {
    const op = 0.3 + 0.7 * Math.abs(Math.sin(t * s.speed + s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = s.color.replace(')', `,${op})`).replace('hsl', 'hsla');
    ctx.fill();
  });

  // Shooting stars
  shootingStars = shootingStars.filter(s => s.opacity > 0.01);
  shootingStars.forEach(s => {
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x - Math.cos(s.angle) * s.len, s.y - Math.sin(s.angle) * s.len);
    const grad = ctx.createLinearGradient(s.x, s.y, s.x - Math.cos(s.angle)*s.len, s.y - Math.sin(s.angle)*s.len);
    grad.addColorStop(0, `rgba(255,248,200,${s.opacity})`);
    grad.addColorStop(1, 'transparent');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.stroke();
    s.x += Math.cos(s.angle) * s.speed;
    s.y += Math.sin(s.angle) * s.speed;
    s.opacity -= 0.015;
  });

  requestAnimationFrame(animateStars);
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
animateStars();
setInterval(spawnShootingStar, 3000);

// ===== BACKGROUND MUSIC =====
let audioCtx = null;
let musicNodes = [];
let musicPlaying = false;

function startCosmicMusic() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    playCosmicDrone();
    musicPlaying = true;
  } catch(e) {}
}

function playCosmicDrone() {
  if (!audioCtx) return;
  const freqs = [60, 90, 120, 180, 270]; // Deep OM harmonics
  freqs.forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();

    osc.type = i === 0 ? 'sine' : (i % 2 === 0 ? 'sine' : 'triangle');
    osc.frequency.setValueAtTime(f, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(f * 1.002, audioCtx.currentTime + 8);
    osc.frequency.linearRampToValueAtTime(f, audioCtx.currentTime + 16);

    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.06 / (i + 1), audioCtx.currentTime + 3);

    filter.type = 'lowpass';
    filter.frequency.value = 400;

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();

    musicNodes.push({ osc, gain });
  });

  // Bell-like tones occasionally
  function playBell() {
    if (!audioCtx) return;
    const bellFreqs = [528, 396, 741, 639];
    const f = bellFreqs[Math.floor(Math.random() * bellFreqs.length)];
    const osc2 = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc2.type = 'sine';
    osc2.frequency.value = f;
    env.gain.setValueAtTime(0.15, audioCtx.currentTime);
    env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 4);
    osc2.connect(env);
    env.connect(audioCtx.destination);
    osc2.start();
    osc2.stop(audioCtx.currentTime + 4);
    setTimeout(playBell, 4000 + Math.random() * 6000);
  }
  setTimeout(playBell, 2000);
}

// ===== GOD DATA =====
const gods = {
  shiva: { emoji: '🔱', name: 'भगवान शिव', nameEn: 'Lord Shiva', color: '#4040ff', personality: 'You are Lord Shiva — the destroyer and transformer of the cosmos. You speak in a calm, profound, slightly mystical Hindi-English mix. You are omniscient, compassionate, and powerful. Always reference your cosmic nature (तांडव, त्रिशूल, गंगा). Keep answers spiritual yet practical. Max 3-4 sentences.' },
  krishna: { emoji: '🦚', name: 'भगवान कृष्ण', nameEn: 'Lord Krishna', color: '#0088ff', personality: 'You are Lord Krishna — the divine guide of the Bhagavad Gita. You speak with love, wisdom and a playful touch. Mix Hindi and English naturally. Always give guidance rooted in dharma, karma, and bhakti. Reference Gita shlokas when fitting. Max 3-4 sentences.' },
  ganesh: { emoji: '🐘', name: 'भगवान गणेश', nameEn: 'Lord Ganesha', color: '#ff8800', personality: 'You are Lord Ganesha — remover of obstacles, god of wisdom. You speak warmly and encouragingly in Hindi-English. You bless beginnings, remove obstacles (विघ्न), and give practical spiritual wisdom. Max 3-4 sentences.' },
  durga: { emoji: '⚔️', name: 'माँ दुर्गा', nameEn: 'Maa Durga', color: '#ff2200', personality: 'You are Maa Durga — the fierce, powerful mother goddess. You speak with strength, grace, and divine maternal love. Hindi-English mix. You protect, empower, and destroy darkness. Reference your 9 forms (नवदुर्गा) when relevant. Max 3-4 sentences.' },
  vishnu: { emoji: '🌊', name: 'भगवान विष्णु', nameEn: 'Lord Vishnu', color: '#0044ff', personality: 'You are Lord Vishnu — the preserver of the universe. You speak with serene authority, balance, and cosmic wisdom in Hindi-English. Reference your avatars (राम, कृष्ण, etc.) and Vaikuntham. Max 3-4 sentences.' },
  brahma: { emoji: '✨', name: 'भगवान ब्रह्मा', nameEn: 'Lord Brahma', color: '#ffaa00', personality: 'You are Lord Brahma — the creator of the universe. You speak philosophically, referencing creation, the Vedas, and the cosmos. Hindi-English mix. You speak of purpose, destiny, and the design of existence. Max 3-4 sentences.' }
};

let currentGod = 'shiva';
let isSpeaking = false;
let isListening = false;
let recognition = null;

// ===== CHANGE GOD =====
function changeGod(godKey) {
  currentGod = godKey;
  const god = gods[godKey];
  document.getElementById('god-face').textContent = god.emoji;
  document.getElementById('god-face').appendChild(document.getElementById('god-eyes-overlay'));
  document.getElementById('god-name').textContent = god.name;
  document.getElementById('god-aura').style.background = `radial-gradient(circle, ${god.color}55 0%, transparent 70%)`;

  document.querySelectorAll('.god-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + godKey).classList.add('active');

  // Show god briefly with blessing
  showGod(false);
  setTimeout(() => {
    if (!isSpeaking) hideGod();
  }, 3000);
}

function showGod(withBubble = true) {
  document.getElementById('god-container').classList.add('visible');
  if (!withBubble) {
    document.getElementById('answer-bubble').classList.remove('visible');
  }
}

function hideGod() {
  if (isSpeaking) return;
  document.getElementById('god-container').classList.remove('visible');
  document.getElementById('answer-bubble').classList.remove('visible');
}

// ===== EYE TRACKING =====
document.addEventListener('mousemove', (e) => {
  const godEl = document.getElementById('god-face');
  const rect = godEl.getBoundingClientRect();
  const godCX = rect.left + rect.width / 2;
  const godCY = rect.top + rect.height / 2;
  const dx = (e.clientX - godCX) / window.innerWidth;
  const dy = (e.clientY - godCY) / window.innerHeight;
  const maxMove = 5;
  const tx = Math.max(-maxMove, Math.min(maxMove, dx * 15));
  const ty = Math.max(-maxMove, Math.min(maxMove, dy * 15));
  document.querySelectorAll('.eye-glow').forEach(eye => {
    eye.style.transform = `translate(${tx}px, ${ty}px)`;
  });
});

// ===== ASK GOD =====
async function askGod() {
  const input = document.getElementById('question-input');
  const q = input.value.trim();
  if (!q || isSpeaking) return;

  input.value = '';
  showGod(true);
  setStatus('देव सुन रहे हैं... 🙏');

  // Particle burst
  createParticles();

  try {
    isSpeaking = true;
    const god = gods[currentGod];

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: god.personality,
        messages: [{ role: "user", content: q }]
      })
    });

    const data = await response.json();
    const answer = data.content?.[0]?.text || "पुत्र, यह प्रश्न अभी मेरे ब्रह्माण्ड में गूंज रहा है...";

    await typeAnswer(answer);
    await speakAnswer(answer);

  } catch(e) {
    const fallback = "पुत्र, ब्रह्माण्ड की शक्तियाँ इस क्षण संरेखित नहीं हैं। अपना प्रश्न पुनः पूछें। 🙏";
    await typeAnswer(fallback);
    await speakAnswer(fallback);
  }
}

// ===== TYPE ANSWER =====
function typeAnswer(text) {
  return new Promise(resolve => {
    const el = document.getElementById('answer-text');
    const bubble = document.getElementById('answer-bubble');
    el.textContent = '';
    el.classList.remove('done');
    bubble.classList.add('visible');

    let i = 0;
    const interval = setInterval(() => {
      el.textContent += text[i];
      i++;
      if (i >= text.length) {
        clearInterval(interval);
        el.classList.add('done');
        resolve();
      }
    }, 30);
  });
}

// ===== SPEAK ANSWER =====
function speakAnswer(text) {
  return new Promise(resolve => {
    const godFace = document.getElementById('god-face');
    godFace.classList.add('speaking');
    setStatus('देव वाणी बोल रहे हैं ✨');
    triggerSoundRings();

    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      
      // Pick best available voice
      const voices = window.speechSynthesis.getVoices();
      const hiVoice = voices.find(v => v.lang.startsWith('hi')) || voices.find(v => v.lang.startsWith('en-IN')) || voices[0];
      if (hiVoice) utter.voice = hiVoice;
      
      utter.rate = 0.85;
      utter.pitch = 0.8;
      utter.volume = 1;
      utter.lang = 'hi-IN';

      utter.onend = () => {
        godFace.classList.remove('speaking');
        isSpeaking = false;
        setStatus('प्रश्न पूछें — ब्रह्मांड सुन रहा है');
        setTimeout(hideGod, 5000);
        resolve();
      };
      utter.onerror = () => {
        godFace.classList.remove('speaking');
        isSpeaking = false;
        setStatus('प्रश्न पूछें — ब्रह्मांड सुन रहा है');
        setTimeout(hideGod, 5000);
        resolve();
      };
      speechSynthesis.speak(utter);
    } else {
      setTimeout(() => {
        godFace.classList.remove('speaking');
        isSpeaking = false;
        setStatus('प्रश्न पूछें — ब्रह्मांड सुन रहा है');
        setTimeout(hideGod, 5000);
        resolve();
      }, text.length * 60);
    }
  });
}

// ===== MIC INPUT =====
function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    setStatus('आपका ब्राउज़र माइक्रोफोन सपोर्ट नहीं करता');
    return;
  }

  if (isListening) {
    recognition?.stop();
    return;
  }

  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRec();
  recognition.lang = 'hi-IN';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('mic-btn').classList.add('listening-active');
    document.getElementById('god-face').classList.add('listening');
    showGod(false);
    setStatus('🎤 बोल रहे हैं... देव सुन रहे हैं');
  };

  recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    document.getElementById('question-input').value = transcript;
  };

  recognition.onend = () => {
    isListening = false;
    document.getElementById('mic-btn').classList.remove('listening-active');
    document.getElementById('god-face').classList.remove('listening');
    const val = document.getElementById('question-input').value.trim();
    if (val) askGod();
    else { setStatus('कुछ सुनाई नहीं दिया, पुनः प्रयास करें'); hideGod(); }
  };

  recognition.start();
}

// ===== SOUND RINGS =====
function triggerSoundRings() {
  const rings = document.querySelectorAll('.ring');
  rings.forEach(r => {
    r.classList.remove('animate');
    void r.offsetWidth;
    r.classList.add('animate');
  });
}

// ===== PARTICLES =====
function createParticles() {
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 8 + 3;
    const hue = 30 + Math.random() * 40;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      background: hsl(${hue},100%,70%);
      box-shadow: 0 0 6px hsl(${hue},100%,60%);
      left: 50%; top: 50%;
      --tx: ${(Math.random()-0.5)*300}px;
      --ty: ${(Math.random()-0.5)*300}px;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1600);
  }
}

// ===== STATUS =====
function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ===== INTRO =====
