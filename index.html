<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ब्रह्माण्ड वाणी — Ultimate Divine Oracle</title>
<style>
/* --- PURANI CSS WAHI RAHEGI --- */
/* (Aapka pehle wala pura CSS yahan paste rahega) */

/* NAYE HOLOGRAM & INTERACTION EFFECTS */
:root {
  --gc: rgba(245, 200, 66, 0.8);
  --hr: 0deg;
}

#god-img {
    transition: filter 0.5s ease, transform 0.3s ease;
    filter: drop-shadow(0 0 20px var(--gc)) brightness(1.1);
}

/* Speaking Aura Pulse */
.god-speaking {
    animation: divine-glow 0.8s ease-in-out infinite alternate !important;
}

@keyframes divine-glow {
    0% { filter: drop-shadow(0 0 15px var(--gc)) brightness(1); transform: scale(1); }
    100% { filter: drop-shadow(0 0 50px white) brightness(1.4); transform: scale(1.03); }
}

/* Listening Tilt */
.god-listening {
    animation: listen-sway 2s ease-in-out infinite;
    filter: drop-shadow(0 0 30px #42a5f5) !important;
}

@keyframes listen-sway {
    0%, 100% { transform: rotate(-2deg) translateY(-5px); }
    50% { transform: rotate(2deg) translateY(-10px); }
}
</style>
</head>
<body>

<script>
// ════════════ CONFIGURATION (TV SERIAL AVATARS) ════════════
const GOD_CONFIG = {
    shiva: { 
        name: "महादेव", 
        img: "https://i.imgur.com/3W7mG5L.png", // Replace with Serial Actor PNG
        color: "rgba(100,200,255,0.8)", 
        hue: "190deg",
        voiceId: "pNInz6obpg8nEmeW146s" // Deep Divine Voice
    },
    krishna: { 
        name: "श्री कृष्ण", 
        img: "https://i.imgur.com/V9rGv8K.png", // Replace with Serial Actor PNG
        color: "rgba(255,220,100,0.8)", 
        hue: "40deg",
        voiceId: "ErXwbc381Jm96m72HqK6" // Soft Calm Voice
    }
};

let currentGod = 'shiva';
let el_key = localStorage.getItem('el_key') || ""; // ElevenLabs API Key

// ════════════ VOICE RECOGNITION (LISTENING) ════════════
const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
const recog = Speech ? new Speech() : null;
if(recog) {
    recog.lang = 'hi-IN';
    recog.onresult = (e) => {
        document.getElementById('qinp').value = e.results[0][0].transcript;
        ask(); // Automatically Send
    };
    recog.onend = () => {
        document.getElementById('micb').classList.remove('on');
        document.getElementById('god-img').classList.remove('god-listening');
    };
}

function togMic() {
    if(!recog) return alert("Speech not supported");
    recog.start();
    document.getElementById('micb').classList.add('on');
    document.getElementById('god-img').classList.add('god-listening');
    showStatus("परमात्मा आपकी प्रतीक्षा कर रहे हैं...");
}

// ════════════ DIVINE BRAIN (AI RESPONSE) ════════════
async function ask() {
    const query = document.getElementById('qinp').value;
    if(!query) return;

    document.getElementById('ldr').classList.add('show');
    document.getElementById('status').innerText = "चिंतन हो रहा है...";
    
    // Yahan hum fake delay de rahe hain real feel ke liye
    // Is jagah aap Gemini API call kar sakte hain
    setTimeout(async () => {
        let response = "वत्स, श्रद्धा रखो। जीवन के हर मोड़ पर मैं तुम्हारे साथ हूँ।";
        
        if(query.includes("रास्ता")) response = "मार्ग कठिन हो सकता है, परंतु धर्म का पथ कभी निष्फल नहीं जाता।";
        
        document.getElementById('ldr').classList.remove('show');
        displayDivineResponse(response);
    }, 1500);
}

// ════════════ ELEVENLABS DIVINE VOICE ════════════
async function speak(text) {
    if(!el_key) {
        // Fallback to Browser Voice
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'hi-IN';
        window.speechSynthesis.speak(u);
        return;
    }

    const vid = GOD_CONFIG[currentGod].voiceId;
    try {
        const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${vid}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'xi-api-key': el_key },
            body: JSON.stringify({ text: text, model_id: "eleven_multilingual_v2" })
        });
        const blob = await res.blob();
        const audio = new Audio(URL.createObjectURL(blob));
        
        const gImg = document.getElementById('god-img');
        gImg.classList.add('god-speaking');
        audio.play();
        audio.onended = () => gImg.classList.remove('god-speaking');
    } catch(e) { console.error("Voice Error", e); }
}

function displayDivineResponse(txt) {
    const wrap = document.getElementById('awrap');
    const target = document.getElementById('atxt');
    wrap.classList.add('show');
    
    let i = 0;
    target.innerText = "";
    const timer = setInterval(() => {
        target.innerText += txt[i];
        i++;
        if(i >= txt.length) {
            clearInterval(timer);
            speak(txt);
        }
    }, 50);
}

// ════════════ UI HANDLERS ════════════
function chgod(id) {
    currentGod = id;
    const g = GOD_CONFIG[id];
    document.getElementById('gname').innerText = g.name;
    document.getElementById('god-img').src = g.img;
    document.documentElement.style.setProperty('--gc', g.color);
    document.documentElement.style.setProperty('--hr', g.hue);
    
    // Animation reset
    const scene = document.getElementById('gscene');
    scene.style.opacity = 0;
    setTimeout(() => scene.style.opacity = 1, 300);
}

function saveS() {
    el_key = document.getElementById('ekey').value;
    localStorage.setItem('el_key', el_key);
    closeS();
    showToast("दिव्य शक्ति (ElevenLabs) सक्रिय!");
}

function enter() {
    document.getElementById('intro').style.opacity = 0;
    setTimeout(() => {
        document.getElementById('intro').style.display = 'none';
        initAC();
        setMusic('om');
        chgod('shiva');
    }, 1800);
}

// OnlineCheckWriter Integration Logic
function checkPayment() {
    // If you plan to use OnlineCheckWriter for premium features
    console.log("Processing Virtual Card with OnlineCheckWriter...");
}
</script>
</body>
</html>
