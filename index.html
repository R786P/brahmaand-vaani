<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>🕉️ Divine AI - Hologram Gods</title>
  
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- ✅ FIXED: Direct CSS Link (Root folder ke liye) -->
  <link rel="stylesheet" href="style.css" />
  
  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <style>
    /* Critical CSS for fast load */
    :root {
      --primary: #ffd700; --secondary: #ff6b6b; --accent: #4ecdc4;
      --dark: #0a0a1a; --glass: rgba(20, 20, 40, 0.8);
      --glass-border: rgba(100, 200, 255, 0.3); --text: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Rajdhani', sans-serif; background: var(--dark);
      color: var(--text); overflow-x: hidden; min-height: 100vh;
    }
    #universe-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -2; background: radial-gradient(ellipse at bottom, #1a1a3a 0%, #0a0a1a 100%);
    }
    .particle {
      position: fixed; width: 3px; height: 3px; background: var(--primary);
      border-radius: 50%; animation: float 15s infinite linear;
      opacity: 0.6; pointer-events: none; z-index: -1;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
    }
    header {
      text-align: center; padding: 15px;
      background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(100,200,255,0.1));
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
    }
    header h1 {
      font-size: 1.6rem; color: var(--primary);
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
    }
    #god-stage {
      display: flex; justify-content: center; align-items: center;
      min-height: 300px; padding: 10px; position: relative;
    }
    #hologram-god {
      position: relative; width: 200px; height: 280px;
      filter: drop-shadow(0 0 20px rgba(100, 200, 255, 0.8));
      animation: hologram-float 4s ease-in-out infinite;
      display: none; /* Hidden by default */
    }
    #hologram-god.visible { display: block; animation: hologram-appear 0.6s ease forwards; }
    @keyframes hologram-float { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.02); } }
    @keyframes hologram-appear { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    
    #god-image {
      width: 100%; height: 100%; object-fit: contain;
      border-radius: 16px;
      background: repeating-linear-gradient(0deg, rgba(100,200,255,0.05) 0px, transparent 4px);
    }
    #eye-contact-overlay {
      position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
      width: 60px; height: 20px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.9), transparent 70%);
      border-radius: 50%; animation: blink 4s infinite; pointer-events: none;
    }
    @keyframes blink { 0%, 48%, 52%, 100% { transform: translate(-50%, -50%) scaleY(1); } 50% { transform: translate(-50%, -50%) scaleY(0.1); } }
    
    #reaction-bubble {
      position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #000; padding: 8px 16px; border-radius: 20px;
      font-weight: 600; font-size: 0.9rem;
      animation: pop-in 0.3s ease; display: none;
    }
    #reaction-bubble.show { display: block; }
    @keyframes pop-in { from { opacity: 0; transform: translateX(-50%) scale(0.8); } to { opacity: 1; transform: translateX(-50%) scale(1); } }
    
    #control-panel {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 20px; padding: 16px; margin: 0 12px 16px;
      backdrop-filter: blur(15px);
    }
    #music-controls {
      display: flex; gap: 10px; margin-bottom: 12px; align-items: center; flex-wrap: wrap;
    }
    #music-controls button {
      flex: 1; padding: 8px 12px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #6a11cb, #2575fc); color: white;
      font-weight: 600; cursor: pointer; font-size: 0.9rem;
    }
    #music-controls select {
      flex: 2; padding: 8px; border-radius: 10px; border: 1px solid var(--glass-border);
      background: rgba(30,30,60,0.9); color: white; font-family: inherit;
    }
    #user-query {
      width: 100%; min-height: 60px; padding: 12px;
      border-radius: 12px; border: 2px solid var(--glass-border);
      background: rgba(15,15,35,0.9); color: white;
      font-family: inherit; font-size: 1rem; resize: vertical;
    }
    #user-query:focus { outline: none; border-color: var(--primary); }
    .input-buttons { display: flex; gap: 10px; margin-top: 10px; }
    .input-buttons button {
      flex: 1; padding: 10px; border: none; border-radius: 10px;
      font-weight: 600; cursor: pointer; color: white; font-size: 0.95rem;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    #voice-btn { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
    #voice-btn.listening { animation: pulse 1.5s infinite; background: #ff4757; }
    @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,71,87,0.4); } 50% { box-shadow: 0 0 0 10px rgba(255,71,87,0); } }
    #send-btn { background: linear-gradient(135deg, #4ecdc4, #44a08d); }
    #voice-status {
      margin-top: 8px; color: var(--accent); font-style: italic;
      text-align: center; font-size: 0.9rem; display: none;
    }
    #voice-status.show { display: block; }
    #response-area {
      margin-top: 16px; padding: 12px;
      background: rgba(30,30,60,0.7); border-radius: 12px;
      border-left: 4px solid var(--primary); display: none;
    }
    #response-area.show { display: block; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    #god-response { line-height: 1.5; margin-bottom: 10px; font-size: 1rem; }
    #speak-response {
      width: 100%; padding: 10px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #a29bfe, #6c5ce7);
      color: white; font-weight: 600; cursor: pointer;
    }
    .god-chips {
      display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto;
      padding-bottom: 5px; scrollbar-width: none;
    }
    .god-chip {
      padding: 6px 14px; background: rgba(100,200,255,0.15);
      border: 1px solid var(--glass-border); border-radius: 16px;
      font-size: 0.85rem; white-space: nowrap; cursor: pointer;
      transition: all 0.2s;
    }
    .god-chip.active { background: var(--primary); color: #000; font-weight: 600; }
    footer { text-align: center; padding: 12px; color: #666; font-size: 0.8rem; }
    @media (max-width: 480px) {
      #hologram-god { width: 160px; height: 220px; }
      header h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div id="universe-container"></div>
  <div id="particles"></div>
  
  <header>
    <h1><i class="fas fa-om"></i> Divine AI</h1>
    <p style="color:#aaa; font-size:0.9rem;">Apna prashn poochiye ✨</p>
  </header>
  
  <!-- God Selection Chips -->
  <div class="god-chips">
    <div class="god-chip active" onclick="selectGod('generic')">🌌 Cosmic</div>
    <div class="god-chip" onclick="selectGod('shiva')">🕉️ Shiva</div>
    <div class="god-chip" onclick="selectGod('vishnu')">🪷 Vishnu</div>
    <div class="god-chip" onclick="selectGod('durga')">🦁 Durga</div>
    <div class="god-chip" onclick="selectGod('ganesh')">🐘 Ganesh</div>
  </div>
  
  <div id="god-stage">
    <div id="hologram-god">
      <!-- ✅ FIXED: Online Placeholder Images (Taaki turant dikhein) -->
      <img id="god-image" src="https://via.placeholder.com/200x280/1a1a3a/ffd700?text=Divine+Form" alt="God" />
      <div id="eye-contact-overlay"></div>
      <div id="reaction-bubble">🙏</div>
    </div>
  </div>

  <div id="control-panel">
    <div id="music-controls">
      <button id="toggle-music"><i class="fas fa-volume-up"></i> <span id="music-text">ON</span></button>
      <select id="music-select">
        <option value="cosmic">🌌 Cosmic</option>
        <option value="shiva">🕉️ Shiva Flute</option>
        <option value="vishnu">🪷 Vishnu Conch</option>
      </select>
    </div>

    <div id="input-area">
      <!-- ✅ FIXED: Textarea for typing -->
      <textarea id="user-query" placeholder="🙏 Yahan likhiye ya mic dabayein..."></textarea>
      <div class="input-buttons">
        <button id="voice-btn"><i class="fas fa-microphone"></i> <span id="voice-text">Sunna</span></button>
        <button id="send-btn"><i class="fas fa-paper-plane"></i> Bhejiye</button>
      </div>
      <div id="voice-status"><i class="fas fa-wave-square"></i> Sun raha hoon...</div>
    </div>

    <div id="response-area">
      <div id="god-response"></div>
      <button id="speak-response"><i class="fas fa-volume-high"></i> Suniye</button>
    </div>
  </div>

  <audio id="bg-music" loop></audio>
  <footer>Divine AI &copy; 2024</footer>

  <!-- ✅ FIXED: Direct JS Link (Root folder ke liye) -->
  <script src="script.js"></script>
  
  <script>
    // Particles generator
    function createParticles() {
      const container = document.getElementById('particles');
      for(let i=0; i<25; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random()*100+'vw';
        p.style.animationDelay = Math.random()*15+'s';
        container.appendChild(p);
      }
    }
    document.addEventListener('DOMContentLoaded', createParticles);
  </script>
</body>
</html>
